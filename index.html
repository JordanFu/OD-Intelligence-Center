<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OD 情报中心 · AI 组织设计研究</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242837;
      --surface3: #2a2f40;
      --border: #2e3348;
      --text: #e1e4ed;
      --text2: #8b91a8;
      --accent: #6c8cff;
      --accent2: #a78bfa;
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --orange: #fbbf24;
      --red: #f87171;
      --trust-high: #fbbf24;
      --trust-mid: #60a5fa;
      --trust-ref: #a78bfa;
      --xhs-red: #ff2442;
      --xhs-red-dim: rgba(255, 36, 66, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1d27 0%, #242837 100%);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 24px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text2);
    }
    .header-stats strong { color: var(--accent); font-weight: 600; }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 3px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .tab-btn.xhs-tab.active {
      background: var(--xhs-red);
    }
    .tab-btn.kb-tab.active {
      background: var(--orange);
      color: #000;
    }
    .tab-btn.hot-tab.active {
      background: linear-gradient(135deg, #ff6b6b, #ee5a24);
    }
    .tab-btn.hot-tab .badge {
      background: rgba(255, 107, 107, 0.3);
      color: #ff6b6b;
    }
    .tab-btn.hot-tab.active .badge {
      background: rgba(255,255,255,0.25);
      color: #fff;
    }
    .tab-btn .badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      font-weight: 600;
    }
    .tab-btn.active .badge {
      background: rgba(255,255,255,0.25);
    }

    /* Page visibility */
    .page { display: none; }
    .page.active { display: block; }

    /* =================== Information Page =================== */
    .controls {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 24px;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 13px;
      color: var(--text2);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .filter-tag {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-tag:hover { border-color: var(--accent); color: var(--text); }
    .filter-tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-tag.trust-high.active { background: var(--trust-high); border-color: var(--trust-high); color: #000; }
    .filter-tag.trust-mid.active { background: var(--trust-mid); border-color: var(--trust-mid); color: #fff; }
    .filter-tag.trust-ref.active { background: var(--trust-ref); border-color: var(--trust-ref); color: #fff; }
    .filter-tag.source-tag.active { background: var(--green); border-color: var(--green); color: #000; }
    .stats {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text2);
    }
    .stats strong { color: var(--accent); }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* Day Group */
    .day-group { margin-top: 32px; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .day-header h2 { font-size: 17px; font-weight: 600; color: var(--text); }
    .day-count {
      font-size: 12px;
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 12px;
      color: var(--text2);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 16px rgba(108, 140, 255, 0.08);
      transform: translateY(-1px);
    }
    .card.active {
      border-color: var(--green);
      box-shadow: 0 4px 24px rgba(52, 211, 153, 0.1);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title-area { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }
    .card-brief {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-trust-mini {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }
    .trust-high { background: rgba(251, 191, 36, 0.15); color: var(--trust-high); }
    .trust-mid { background: rgba(96, 165, 250, 0.15); color: var(--trust-mid); }
    .trust-ref { background: rgba(167, 139, 250, 0.15); color: var(--trust-ref); }
    .card-expand-icon {
      width: 20px;
      height: 20px;
      color: var(--text2);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .card.active .card-expand-icon {
      transform: rotate(180deg);
      color: var(--green);
    }
    .card-meta-mini {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text2);
    }

    /* Reader Panel */
    .reader-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.3s ease;
      margin-top: 0;
    }
    .reader-panel.open {
      max-height: 1200px;
      opacity: 1;
      margin-top: 4px;
    }
    .reader-inner { padding: 24px; }
    .reader-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .reader-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.3;
      line-height: 1;
      flex-shrink: 0;
    }
    .reader-title { font-size: 18px; font-weight: 700; line-height: 1.5; }
    .reader-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .reader-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text2);
    }
    .reader-meta-item strong { color: var(--text); font-weight: 500; }
    .reader-section { margin-bottom: 16px; }
    .reader-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .reader-section-label .icon { width: 16px; height: 16px; }
    .reader-summary { font-size: 15px; line-height: 1.8; }
    .reader-insight {
      font-size: 15px;
      color: var(--green);
      background: var(--green-dim);
      padding: 16px 18px;
      border-radius: 10px;
      border-left: 4px solid var(--green);
      line-height: 1.8;
    }
    .reader-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .reader-tag {
      font-size: 12px;
      padding: 4px 10px;
      background: var(--surface);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .reader-tag:hover { background: var(--border); color: var(--text); }
    .reader-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .btn-read-original {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-read-original:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-close-panel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-close-panel:hover { border-color: var(--text2); color: var(--text); }
    .btn-generate-xhs {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--xhs-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-generate-xhs:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Source coverage bar */
    .coverage {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .coverage-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .coverage-bar { display: flex; flex-wrap: wrap; gap: 6px; }
    .coverage-item {
      font-size: 11px;
      padding: 3px 8px;
      background: var(--surface2);
      border-radius: 12px;
      color: var(--text2);
    }
    .coverage-item.active {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
    }
    .coverage-count { color: var(--text); font-weight: 600; }

    /* =================== Daily Report Page =================== */
    .report-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }
    .report-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .report-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .report-stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }
    .report-stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* =================== Master Report Banner =================== */
    .master-report-banner {
      background: linear-gradient(135deg, #1a1d27 0%, #232840 100%);
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .master-report-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--green));
    }
    .master-report-banner-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(108, 140, 255, 0.15);
      color: var(--accent);
      border: 1px solid rgba(108, 140, 255, 0.3);
      margin-bottom: 10px;
    }
    .master-report-banner h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .master-report-banner .subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 14px;
    }
    .master-report-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .master-report-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
    }
    .master-report-stat strong { color: var(--text); font-weight: 600; }
    .sub-props-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .sub-prop-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .sub-prop-chip-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sub-prop-chip-finding { font-size: 11px; color: var(--text2); line-height: 1.4; }
    .sub-prop-chip.high { border-left: 3px solid var(--red); }
    .sub-prop-chip.medium { border-left: 3px solid var(--orange); }
    .master-report-insights { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .master-report-insight {
      font-size: 13px;
      color: var(--text);
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }
    .master-report-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .master-report-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
    }
    .master-report-btn-primary { background: var(--accent); color: #fff; }
    .master-report-btn-primary:hover { background: #5a7ae0; }
    .master-report-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .master-report-btn-secondary:hover { border-color: var(--accent); }

    .trust-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface2);
      margin: 12px 0;
    }
    .trust-bar-seg { height: 100%; transition: width 0.4s ease; }
    .trust-bar-seg.high { background: var(--trust-high); }
    .trust-bar-seg.mid { background: var(--trust-mid); }
    .trust-bar-seg.ref { background: var(--trust-ref); }
    .trust-legend { display: flex; gap: 16px; font-size: 12px; color: var(--text2); }
    .trust-legend-item { display: flex; align-items: center; gap: 4px; }
    .trust-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .report-timeline { position: relative; padding-left: 28px; }
    .report-timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .report-day { position: relative; margin-bottom: 24px; }
    .report-day-dot {
      position: absolute;
      left: -24px;
      top: 16px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }
    .report-day-dot.today {
      background: var(--green);
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
    }
    .report-day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .report-day-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(108, 140, 255, 0.08);
    }
    .report-day-card.expanded { border-color: var(--green); }
    .report-day-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .report-day-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .report-day-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--green-dim);
      color: var(--green);
      font-weight: 500;
    }
    .report-day-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text2);
      flex-shrink: 0;
    }
    .report-day-meta strong { color: var(--text); font-weight: 500; }
    .report-day-expand {
      width: 20px;
      height: 20px;
      color: var(--text2);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .report-day-card.expanded .report-day-expand {
      transform: rotate(180deg);
      color: var(--green);
    }
    .report-day-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .report-day-card.expanded .report-day-body { max-height: 3000px; }
    .report-day-content {
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }
    .report-section { margin-top: 20px; }
    .report-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .source-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .source-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--text2);
      font-weight: 500;
      font-size: 12px;
    }
    .source-table th:first-child { border-radius: 6px 0 0 6px; }
    .source-table th:last-child { border-radius: 0 6px 6px 0; }
    .source-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .pick-item {
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 3px solid var(--green);
      transition: border-color 0.2s;
    }
    .pick-item:hover { border-left-color: var(--accent); }
    .pick-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .pick-meta { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .pick-reason { font-size: 13px; color: var(--green); line-height: 1.5; }
    .pick-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      margin-top: 4px;

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // State
    // ============================================================
    let allDays = [];
    let allReports = [];
    let masterReport = null;
    let xhsNotes = [];
    let kbReports = [];
    let currentTab = 'info';
    let activeTagFilter = null;
    let activeSourceFilter = null;
    let activeTrustFilter = null;
    let openCardId = null;
    let expandedReportDate = null;
    let xhsViewMode = 'full'; // 'full' | 'compact'
    let xhsExpandedCards = new Set();
    let isGenerating = false;
    let kbSourceTypeFilter = null;
    let kbTopicFilter = null;
    let hotAnalysis = null;

    const PLATFORM_CATEGORIES = {
      '国内媒体': ['36氪', '机器之心', '钛媒体', '虎嗅', '界面新闻', '第一财经', '晚点LatePost', '新智元', '量子位', '新浪财经', '搜狐', '每日经济新闻'],
      '国际媒体': ['Hacker News', 'TechCrunch', 'The Verge', 'Wired', 'MIT Technology Review', 'Bloomberg', 'Reuters', 'WinBuzzer', 'siuleeboss'],
      '咨询公司': ['McKinsey', 'BCG', 'Bain', 'Mercer', 'Aon', 'Deloitte', '德勤', 'PwC', 'EY', 'Capgemini', 'WTW', 'Gartner'],
      '学术机构': ['HBR', 'HBS', 'Harvard', 'Stanford HAI', 'MIT CSAIL', 'MIT', 'arXiv', 'SSRN'],
      '行业研究': ['HRTech', 'InfoQ', '火山引擎', 'CCF'],
      '社交平台': ['小红书', '微信公众号', '知乎', '即刻', 'LinkedIn', 'Twitter/X', 'Reddit', '百度百家']
    };

    const TRUST_LEVELS = {
      '⭐高': { label: '⭐ 官方/学术/权威', class: 'trust-high', key: 'high' },
      '📰较高': { label: '📰 知名媒体', class: 'trust-mid', key: 'mid' },
      '💬参考': { label: '💬 社交/社区', class: 'trust-ref', key: 'ref' }
    };

    // ============================================================
    // Utility
    // ============================================================
    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }
    function highlightText(text, query) {
      if (!query || !text) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ============================================================
    // Tab Switching
    // ============================================================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active',
          (i === 0 && tab === 'info') ||
          (i === 1 && tab === 'report') ||
          (i === 2 && tab === 'xhs') ||
          (i === 3 && tab === 'kb') ||
          (i === 4 && tab === 'hot'));
      });
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${tab}`).classList.add('active');
      if (tab === 'xhs') renderXHSPage();
      if (tab === 'kb') renderKBPage();
      if (tab === 'hot') renderHotPage();
    }

    // ============================================================
    // Parser
    // ============================================================
    function parseDigest(markdown) {
      const lines = markdown.split('\n');
      let currentDay = null;
      let currentItem = null;
      const days = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.includes('<!--')) continue;
        const dayMatch = line.match(/^## (\d{4}-\d{2}-\d{2})/);
        if (dayMatch) {
          if (currentDay && currentDay.items.length > 0) days.push(currentDay);
          currentDay = { date: dayMatch[1], items: [] };
          currentItem = null;
          continue;
        }
        if (!currentDay) continue;
        const titleMatch = line.match(/^### \[(\d+)\]\s+(.+)/);
        if (titleMatch) {
          currentItem = {
            id: titleMatch[1], title: titleMatch[2],
            summary: '', source: '', sourceUrl: '', platform: '',
            trust: '', insight: '', tags: [], time: ''
          };
          currentDay.items.push(currentItem);
          continue;
        }
        if (!currentItem) continue;
        const summaryMatch = line.match(/^- \*\*事件摘要\*\*[：:]\s*(.+)/);
        if (summaryMatch) { currentItem.summary = summaryMatch[1]; continue; }
        const sourceMatch = line.match(/^- \*\*来源\*\*[：:]\s*(.+)/);
        if (sourceMatch) {
          const raw = sourceMatch[1].trim();
          const mdLinkMatch = raw.match(/^\[([^\]]*)\]\(([^)]+)\)$/);
          if (mdLinkMatch) {
            currentItem.source = mdLinkMatch[1];
            currentItem.sourceUrl = mdLinkMatch[2];
          } else {
            const parenMatch = raw.match(/^(.+?)[（(](.+?)[）)]/);
            if (parenMatch) {
              currentItem.source = parenMatch[1].trim();
              currentItem.sourceUrl = parenMatch[2].trim();
            } else {
              currentItem.source = raw;
            }
          }
          continue;
        }
        const platformMatch = line.match(/^- \*\*来源平台\*\*[：:]\s*(.+)/);
        if (platformMatch) { currentItem.platform = platformMatch[1].trim(); continue; }
        const trustMatch = line.match(/^- \*\*来源可信度\*\*[：:]\s*(.+)/);
        if (trustMatch) { currentItem.trust = trustMatch[1].trim(); continue; }
        const insightMatch = line.match(/^- \*\*OD启示\*\*[：:]\s*(.+)/);
        if (insightMatch) { currentItem.insight = insightMatch[1]; continue; }
        const tagMatch = line.match(/^- \*\*标签\*\*[：:]\s*(.+)/);
        if (tagMatch) {
          currentItem.tags = tagMatch[1].match(/#[\w\u4e00-\u9fff-]+/g) || [];
          currentItem.tags = currentItem.tags.map(t => t.replace('#', ''));
          continue;
        }
        const timeMatch = line.match(/^- \*\*抓取时间\*\*[：:]\s*(.+)/);
        if (timeMatch) { currentItem.time = timeMatch[1]; continue; }
      }
      if (currentDay && currentDay.items.length > 0) days.push(currentDay);
      return days;
    }

    // ============================================================
    // Load
    // ============================================================
    async function loadData() {
      try {
        const resp = await fetch('./digest.md');
        if (resp.ok) {
          const text = await resp.text();
          allDays = parseDigest(text);
        }
      } catch (e) { console.log('digest.md not loaded'); }

      try {
        const resp = await fetch('./daily-report/digest.json');
        if (resp.ok) {
          const data = await resp.json();
          allReports = (data.reports || []).sort((a, b) => b.date.localeCompare(a.date));
          masterReport = data.masterReport || null;
        }
      } catch (e) { console.log('digest.json not loaded'); }

      // Try loading pre-generated XHS content
      try {
        const resp = await fetch('./xhs-content/digest.json');
        if (resp.ok) {
          const data = await resp.json();
          xhsNotes = data.notes || [];
        }
      } catch (e) { console.log('xhs digest not loaded'); }

      // Try loading knowledge base catalog
      try {
        const resp = await fetch('./knowledge/catalog.json');
        if (resp.ok) {
          const data = await resp.json();
          kbReports = data.reports || [];
        }
      } catch (e) { console.log('kb catalog not loaded'); }

      // Try loading hot topic analysis
      try {
        const resp = await fetch('./analysis/digest.json');
        if (resp.ok) {
          const data = await resp.json();
          hotAnalysis = data;
        }
      } catch (e) { console.log('hot analysis not loaded'); }

      updateBadges();
      renderInfoPage();
      renderReportPage();
    }

    function updateBadges() {
      const totalItems = allDays.reduce((s, d) => s + d.items.length, 0);
      document.getElementById('infoBadge').textContent = totalItems;
      document.getElementById('reportBadge').textContent = allReports.length;
      document.getElementById('xhsBadge').textContent = xhsNotes.length;
      document.getElementById('kbBadge').textContent = kbReports.length;

      const totalDays = allDays.length;
      const totalSources = new Set();
      allDays.forEach(d => d.items.forEach(item => {
        totalSources.add(item.platform || item.source || '');
      }));
      document.getElementById('headerStats').innerHTML =
        `<span>📅 <strong>${totalDays}</strong> 天</span>` +
        `<span>📄 <strong>${totalItems}</strong> 条</span>` +
        `<span>📡 <strong>${totalSources.size}</strong> 源</span>`;
    }

    // ============================================================
    // Info Page Renderers
    // ============================================================
    function getAllTags() {
      const tagSet = new Set();
      allDays.forEach(d => d.items.forEach(item => item.tags.forEach(t => tagSet.add(t))));
      return Array.from(tagSet).sort();
    }
    function getAllPlatforms() {
      const srcMap = new Map();
      allDays.forEach(d => d.items.forEach(item => {
        const p = item.platform || item.source || '未知';
        srcMap.set(p, (srcMap.get(p) || 0) + 1);
      }));
      return Array.from(srcMap.entries()).sort((a, b) => b[1] - a[1]);
    }
    function getTrustStats() {
      const stats = { '⭐高': 0, '📰较高': 0, '💬参考': 0, '': 0 };
      allDays.forEach(d => d.items.forEach(item => {
        const t = item.trust || '';
        if (stats[t] !== undefined) stats[t]++;
        else stats['']++;
      }));
      return stats;
    }
    function renderTrustFilters() {
      const container = document.getElementById('trustFilters');
      const stats = getTrustStats();
      let html = '<span class="filter-label">可信度：</span>';
      html += `<span class="filter-tag ${!activeTrustFilter ? 'active' : ''}" onclick="setTrustFilter(null)">全部</span>`;
      for (const [key, info] of Object.entries(TRUST_LEVELS)) {
        const count = stats[key] || 0;
        if (count > 0) {
          html += `<span class="filter-tag ${info.class} ${activeTrustFilter === key ? 'active' : ''}" onclick="setTrustFilter('${key}')">${info.label} (${count})</span>`;
        }
      }
      container.innerHTML = html;
    }
    function renderSourceFilters() {
      const container = document.getElementById('sourceFilters');
      const platforms = getAllPlatforms();
      if (platforms.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="filter-label">来源：</span>';
      html += `<span class="filter-tag source-tag ${!activeSourceFilter ? 'active' : ''}" onclick="setSourceFilter(null)">全部</span>`;
      platforms.forEach(([name, count]) => {
        html += `<span class="filter-tag source-tag ${activeSourceFilter === name ? 'active' : ''}" onclick="setSourceFilter('${name.replace(/'/g, "\\'")}')">${esc(name)} (${count})</span>`;
      });
      container.innerHTML = html;
    }
    function renderTagFilters() {
      const container = document.getElementById('tagFilters');
      const tags = getAllTags();
      if (tags.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="filter-label">标签：</span>';
      html += `<span class="filter-tag ${!activeTagFilter ? 'active' : ''}" onclick="setTagFilter(null)">全部</span>`;
      tags.forEach(tag => {
        html += `<span class="filter-tag ${activeTagFilter === tag ? 'active' : ''}" onclick="setTagFilter('${tag}')">#${esc(tag)}</span>`;
      });
      container.innerHTML = html;
    }
    function renderCoverage() {
      const container = document.getElementById('coverage');
      const platforms = getAllPlatforms();
      if (platforms.length === 0) { container.innerHTML = ''; return; }
      let html = '<div class="coverage-title">📊 来源覆盖情况（' + platforms.length + ' 个平台）</div><div class="coverage-bar">';
      for (const [cat, expectedPlatforms] of Object.entries(PLATFORM_CATEGORIES)) {
        for (const ep of expectedPlatforms) {
          const found = platforms.find(([name]) => name.includes(ep));
          html += `<span class="coverage-item ${found ? 'active' : ''}">${ep}${found ? ` <span class="coverage-count">(${found[1]})</span>` : ''}</span>`;
        }
      }
      html += '</div>';
      container.innerHTML = html;
    }
    function setTrustFilter(trust) { activeTrustFilter = trust; renderInfoPage(); }
    function setSourceFilter(source) { activeSourceFilter = source; renderInfoPage(); }
    function setTagFilter(tag) { activeTagFilter = tag; renderInfoPage(); }
    function toggleCard(date, id) {
      const cardKey = `${date}-${id}`;
      openCardId = openCardId === cardKey ? null : cardKey;
      renderInfoList();
    }

    function renderInfoPage() {
      renderTrustFilters();
      renderSourceFilters();
      renderTagFilters();
      renderCoverage();
      renderInfoList();
    }

    function renderInfoList() {
      const query = document.getElementById('searchBox').value.toLowerCase().trim();
      const container = document.getElementById('infoContent');
      const statsEl = document.getElementById('stats');
      let filteredDays = allDays.map(day => {
        const filteredItems = day.items.filter(item => {
          if (activeTrustFilter && item.trust !== activeTrustFilter) return false;
          if (activeSourceFilter) {
            const p = item.platform || item.source || '';
            if (p !== activeSourceFilter && !p.includes(activeSourceFilter) && !activeSourceFilter.includes(p)) return false;
          }
          if (activeTagFilter && !item.tags.includes(activeTagFilter)) return false;
          if (query) {
            const haystack = [item.title, item.summary, item.source, item.platform, item.insight, ...item.tags].join(' ').toLowerCase();
            return haystack.includes(query);
          }
          return true;
        });
        return { ...day, items: filteredItems };
      });

      statsEl.innerHTML = `共 <strong>${totalDays}</strong> 天 · <strong>${totalItems}</strong> 条信息${filters.length ? ' · ' + filters.join(' · ') : ''}`;
      if (totalItems === 0) {
        container.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><h3>${allDays.length === 0 ? '暂无沉淀内容' : '未找到匹配结果'}</h3><p>${allDays.length === 0 ? '信息搜集自动化已配置，每天 8:00 / 13:00 / 17:00 自动从 40+ 来源抓取。' : '试试调整搜索关键词或筛选条件'}</p></div>`;
        return;
      }
      let html = '';
      filteredDays.forEach(day => {
        if (day.items.length === 0) return;
        html += `<div class="day-group"><div class="day-header"><h2>📅 ${day.date}</h2><span class="day-count">${day.items.length} 条</span></div>`;
        day.items.forEach(item => {
          const cardKey = `${day.date}-${item.id}`;
          const isActive = openCardId === cardKey;

          }
          html += `<div class="card ${isActive ? 'active' : ''}" onclick="toggleCard('${day.date}', '${item.id}')"><div class="card-header"><div class="card-title-area"><div class="card-title">${highlightText(esc(item.title), query)}</div><div class="card-brief">${highlightText(esc(truncate(item.summary, 80)), query)}</div></div><div class="card-right">${item.trust ? `<span class="card-trust-mini ${trustClass}">${esc(item.trust)}</span>` : ''}<svg class="card-expand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></div></div><div class="card-meta-mini"><span>${esc(item.source)}</span>${item.platform ? `<span>· ${esc(item.platform)}</span>` : ''}${item.tags.length > 0 ? `<span>· ${item.tags.slice(0, 3).map(t => '#' + t).join(' ')}${item.tags.length > 3 ? ' +' + (item.tags.length - 3) : ''}</span>` : ''}</div></div>`;
          html += `<div class="reader-panel ${isActive ? 'open' : ''}" id="panel-${cardKey}"><div class="reader-inner"><div class="reader-header"><div class="reader-num">${item.id}</div><div class="reader-title">${highlightText(esc(item.title), query)}</div></div><div class="reader-meta"><span class="reader-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><strong>${esc(item.source)}</strong></span>${item.platform ? `<span class="reader-meta-item">📍 ${esc(item.platform)}</span>` : ''}${item.trust ? `<span class="reader-meta-item">${esc(item.trust)}</span>` : ''}${item.time ? `<span class="reader-meta-item">🕐 ${esc(item.time)}</span>` : ''}</div>${item.summary ? `<div class="reader-section"><div class="reader-section-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>事件摘要</div><div class="reader-summary">${highlightText(esc(item.summary), query)}</div></div>` : ''}${item.insight ? `<div class="reader-section"><div class="reader-section-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>OD 启示</div><div class="reader-insight">${highlightText(esc(item.insight), query)}</div></div>` : ''}${item.tags.length > 0 ? `<div class="reader-tags">${item.tags.map(t => `<span class="reader-tag" onclick="event.stopPropagation(); setTagFilter('${t}')">#${esc(t)}</span>`).join('')}</div>` : ''}<div class="reader-actions">${item.sourceUrl ? `<a class="btn-read-original" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>阅读原文</a>` : ''}<button class="btn-generate-xhs" onclick="event.stopPropagation(); generateXHSFromItem('${day.date}', '${item.id}')">📕 生成小红书</button><button class="btn-close-panel" onclick="event.stopPropagation(); toggleCard('${day.date}', '${item.id}')">收起</button></div></div></div>`;
        });

    }

    // ============================================================
    // Report Page Renderers
    // ============================================================
    function toggleReport(date) {
      expandedReportDate = expandedReportDate === date ? null : date;
      renderReportTimeline();
    }
    function renderReportPage() {
      const container = document.getElementById('reportContent');
      if (allReports.length === 0 && !masterReport) {
        container.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><h3>暂无日报</h3><p>每日 17:00 自动生成工作日报，届时这里会展示日报时间线。</p></div>`;

        const insightsHtml = m.topInsights ? m.topInsights.map(i => `<div class="master-report-insight">${esc(i)}</div>`).join('') : '';

      container.innerHTML = html;

    function renderReportTimeline() {

    // ============================================================
    // XHS Content Workshop

    function renderXHSPage() {
      const container = document.getElementById('xhsContent');
      const dates = allDays.map(d => d.date).sort().reverse();

      let html = '';

      // Generate panel
      html += `<div class="xhs-generate-panel">`;
      html += `<div class="xhs-generate-header">`;
      html += `<div class="xhs-generate-title"><span class="xhs-icon">📕</span> 内容工坊</div>`;
      html += `<div class="xhs-gen-stats">已生成 <strong>${xhsNotes.length}</strong> 篇</div>`;
      html += `</div>`;
      html += `<div class="xhs-generate-desc">基于情报库中的高价值信息，自动生成适合小红书发布的内容。每篇包含：标题、正文、话题标签、配图建议。可直接复制到小红书发布。</div>`;
      html += `<div class="xhs-gen-options">`;
      if (dates.length > 0) {
        html += `<select class="xhs-date-select" id="xhsDateSelect">`;
        html += `<option value="latest">最新一天 (${dates[0]})</option>`;
        html += `<option value="all">全部数据 (${allDays.reduce((s, d) => s + d.items.length, 0)} 条)</option>`;
        dates.slice(0, 7).forEach(d => {
          const count = allDays.find(dd => dd.date === d)?.items.length || 0;
          html += `<option value="${d}">${d} (${count} 条)</option>`;
        });
        html += `</select>`;
      }
      html += `<button class="xhs-gen-btn" onclick="generateXHSContent()" ${isGenerating ? 'disabled' : ''}>`;
      html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`;
      html += `${isGenerating ? '生成中...' : '生成小红书内容'}`;
      html += `</button>`;
      html += `<button class="xhs-gen-btn xhs-gen-btn-secondary" onclick="clearXHSContent()">清空</button>`;
      html += `</div></div>`;

      // View toggle and cards
      if (xhsNotes.length > 0) {
        html += `<div class="xhs-cards-header">`;
        html += `<div class="xhs-cards-title">📚 生成的内容 (${xhsNotes.length} 篇)</div>`;
        html += `<div class="xhs-view-toggle">`;
        html += `<button class="xhs-view-btn ${xhsViewMode === 'full' ? 'active' : ''}" onclick="setXHSView('full')">展开</button>`;
        html += `<button class="xhs-view-btn ${xhsViewMode === 'compact' ? 'active' : ''}" onclick="setXHSView('compact')">折叠</button>`;
        html += `</div></div>`;

        xhsNotes.forEach((note, idx) => {
          const isExpanded = xhsViewMode === 'full' || xhsExpandedCards.has(idx);
          html += renderXHSCard(note, idx, isExpanded);
        });
      } else {
        html += `<div class="xhs-empty">`;
        html += `<div class="xhs-empty-icon">📕</div>`;
        html += `<h3>还没有生成内容</h3>`;
        html += `<p>点击上方"生成小红书内容"按钮，基于情报库数据自动生成 3-5 篇适合小红书发布的内容笔记。</p>`;
        html += `</div>`;
      }

      container.innerHTML = html;
    }

    function renderXHSCard(note, idx, isExpanded) {
      const template = XHS_TEMPLATES[note.type] || XHS_TEMPLATES.truth;
      let html = `<div class="xhs-note-card ${isExpanded ? '' : 'compact'}" ${!isExpanded ? `onclick="toggleXHSCard(${idx})"` : ''}>`;

      // Header
      html += `<div class="xhs-note-header">`;
      html += `<div class="xhs-note-num">${idx + 1}</div>`;
      html += `<div class="xhs-note-info">`;
      html += `<div class="xhs-note-title-text">${esc(note.title)}</div>`;
      html += `<span class="xhs-note-type ${template.class}">${template.label}</span>`;
      html += `</div>`;
      html += `<div class="xhs-note-meta">`;
      html += `<span>${note.charCount} 字</span>`;
      if (note.sourceCount) html += `<span>${note.sourceCount} 个来源</span>`;
      html += `</div>`;
      if (!isExpanded) {
        html += `<svg class="report-day-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;
      }
      html += `</div>`;

      if (isExpanded) {
        // Body
        html += `<div class="xhs-note-body">`;

        // Text content (white card mimicking XHS post)
        html += `<div class="xhs-text-content" id="xhs-text-${idx}">${esc(note.content)}</div>`;

        // Sources
        if (note.sources && note.sources.length > 0) {
          html += `<div class="xhs-sources"><div class="xhs-sources-title">📎 信息来源</div>`;
          note.sources.forEach(src => {
            html += `<div class="xhs-source-item">`;
            html += `<span class="xhs-source-dot"></span>`;
            html += `<span>${esc(src.title)}</span>`;
            if (src.url) html += ` · <a href="${esc(src.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">原文</a>`;
            html += `</div>`;
          });
          html += `</div>`;
        }

        // Image suggestion
        if (note.imageSuggestion) {
          html += `<div class="xhs-image-suggestion">`;
          html += `<div class="xhs-image-label">🎨 配图建议</div>`;
          html += `<div class="xhs-image-desc">${esc(note.imageSuggestion)}</div>`;
          html += `</div>`;
        }

        html += `</div>`;

        // Actions
        html += `<div class="xhs-note-actions">`;
        html += `<button class="xhs-action-btn primary" onclick="copyXHSText(${idx})">`;
        html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
        html += `复制正文`;
        html += `</button>`;
        html += `<button class="xhs-action-btn" onclick="copyXHSFull(${idx})">`;
        html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
        html += `复制全部`;
        html += `</button>`;
        html += `<button class="xhs-action-btn" onclick="regenerateXHSSingle(${idx})">🔄 重新生成</button>`;
        html += `</div>`;
      }

      html += `</div>`;
      return html;
    }

    function setXHSView(mode) {
      xhsViewMode = mode;
      if (mode === 'full') xhsExpandedCards.clear();
      renderXHSPage();
    }

    function toggleXHSCard(idx) {
      if (xhsExpandedCards.has(idx)) {
        xhsExpandedCards.delete(idx);
      } else {
        xhsExpandedCards.add(idx);
      }
      renderXHSPage();
    }

    function copyXHSText(idx) {
      const note = xhsNotes[idx];
      if (note) {
        navigator.clipboard.writeText(note.content).then(() => showToast('正文已复制到剪贴板'));
      }
    }

    function copyXHSFull(idx) {
      const note = xhsNotes[idx];
      if (!note) return;
      let fullText = note.content + '\n\n';
      if (note.sources && note.sources.length > 0) {
        fullText += '📎 参考来源：\n';
        note.sources.forEach(src => {
          fullText += `· ${src.title}`;
          if (src.url) fullText += ` ${src.url}`;
          fullText += '\n';
        });
      }
      if (note.imageSuggestion) {
        fullText += '\n🎨 配图建议：' + note.imageSuggestion;
      }
      navigator.clipboard.writeText(fullText).then(() => showToast('全部内容已复制到剪贴板'));
    }

    function clearXHSContent() {
      xhsNotes = [];
      updateBadges();
      renderXHSPage();
      showToast('已清空');
    }

    function regenerateXHSSingle(idx) {
      if (idx >= xhsNotes.length) return;
      const note = xhsNotes[idx];
      // Re-generate with same sources but different hook/template
      const types = Object.keys(XHS_TEMPLATES);
      const newType = types[Math.floor(Math.random() * types.length)];
      const newNote = generateSingleNote(note.sourceItems || [], newType);
      if (newNote) {
        xhsNotes[idx] = newNote;
        renderXHSPage();
        showToast('已重新生成');
      }
    }

    // ============================================================
    // XHS Content Generation Engine
    // ============================================================

    // Generate XHS note from a single info item (triggered from info library)
    function generateXHSFromItem(date, id) {
      // Find the item
      const day = allDays.find(d => d.date === date);
      if (!day) { showToast('未找到该信息'); return; }
      const item = day.items.find(i => i.id === id);
      if (!item) { showToast('未找到该信息'); return; }

      if (!item.insight && !item.summary) {
        showToast('该信息内容不足，无法生成小红书内容');
        return;
      }

      // Pick 1-2 related items from same day as context (optional enrichment)
      const sourceItems = [{ ...item, date: day.date }];
      const sameDayOthers = day.items.filter(i => i.id !== id && (i.insight || i.summary));
      if (sameDayOthers.length > 0) {
        // Pick at most 1 related item
        const related = sameDayOthers.find(i => {
          const myTags = new Set(item.tags || []);
          const theirTags = new Set(i.tags || []);
          return [...myTags].some(t => theirTags.has(t));
        });
        if (related) sourceItems.push({ ...related, date: day.date });
      }

      // Determine best type based on item content
      const types = Object.keys(XHS_TEMPLATES);
      let bestType = 'truth'; // default
      if (item.tags && (item.tags.some(t => t.includes('争议') || t.includes('挑战') || t.includes('风险') || t.includes('裁员') || t.includes('文化')))) {
        bestType = 'opinion';
      } else if (item.tags && (item.tags.some(t => t.includes('趋势') || t.includes('预测') || t.includes('未来') || t.includes('转型') || t.includes('数据')))) {
        bestType = 'truth';
      } else if (item.tags && (item.tags.some(t => t.includes('方法') || t.includes('实践') || t.includes('落地') || t.includes('策略') || t.includes('能力') || t.includes('技能')))) {
        bestType = 'survive';
      } else if (item.tags && (item.tags.some(t => t.includes('人才') || t.includes('领导力') || t.includes('组织') || t.includes('绩效')))) {
        bestType = 'rant';
      }

      // Generate the note
      const note = generateSingleNote(sourceItems, bestType);
      if (!note) { showToast('生成失败，请重试'); return; }

      // Add to existing notes (prepend so it appears at top)
      xhsNotes.unshift(note);
      updateBadges();

      // Switch to XHS tab and expand the new note
      xhsViewMode = 'full';
      xhsExpandedCards.clear();
      xhsExpandedCards.add(0);
      switchTab('xhs');

      showToast(`已基于「${truncate(item.title, 15)}」生成小红书内容`);
    }

    function generateXHSContent() {
      if (allDays.length === 0 || isGenerating) return;

      isGenerating = true;
      renderXHSPage();

      // Use setTimeout to let UI update
      setTimeout(() => {
        const dateSelect = document.getElementById('xhsDateSelect');
        const selectedDate = dateSelect ? dateSelect.value : 'latest';

        let sourceItems = [];

        if (selectedDate === 'all') {
          allDays.forEach(day => {
            day.items.forEach(item => {
              if (item.insight || item.summary) {
                sourceItems.push({ ...item, date: day.date });
              }
            });
          });
        } else {
          const targetDate = selectedDate === 'latest'
            ? allDays.map(d => d.date).sort().reverse()[0]
            : selectedDate;
          const day = allDays.find(d => d.date === targetDate);
          if (day) {
            day.items.forEach(item => {
              if (item.insight || item.summary) {
                sourceItems.push({ ...item, date: day.date });
              }
            });
          }
        }

        // Filter for high-quality items (those with insights)
        const qualityItems = sourceItems.filter(item => item.insight && item.insight.length > 20);

        if (qualityItems.length === 0) {
          isGenerating = false;
          renderXHSPage();
          showToast('没有足够的高质量数据来生成内容');
          return;
        }

        // Generate 3-5 notes
        const count = Math.min(Math.max(3, Math.floor(qualityItems.length / 2)), 5);
        const newNotes = [];

        // Strategy: pick different types
        const typePool = ['rant', 'truth', 'survive', 'opinion'];
        const usedIndices = new Set();

        for (let i = 0; i < count && i < qualityItems.length; i++) {
          const type = typePool[i % typePool.length];

          // Pick 1-3 source items for this note
          let noteItems;
          if (type === 'truth' || type === 'opinion') {
            // For truth/opinion, pick 2-3 related items for richer content
            noteItems = pickRelatedItems(qualityItems, usedIndices, 2 + Math.floor(Math.random() * 2));
          } else {
            // For rant/survive, pick 1-2 focused items
            noteItems = pickRelatedItems(qualityItems, usedIndices, 1 + Math.floor(Math.random() * 2));
          }

          if (noteItems.length === 0) continue;

          noteItems.forEach(item => usedIndices.add(qualityItems.indexOf(item)));
          const note = generateSingleNote(noteItems, type);
          if (note) newNotes.push(note);
        }

        xhsNotes = newNotes;
        updateBadges();
        isGenerating = false;
        renderXHSPage();

        if (newNotes.length > 0) {
          showToast(`成功生成 ${newNotes.length} 篇小红书内容`);
        }
      }, 300);
    }

    function pickRelatedItems(items, usedIndices, count) {
      // Try to find related items (same tags)
      const available = items.filter((_, i) => !usedIndices.has(i));
      if (available.length === 0) return [];

      const picked = [];
      const first = available[Math.floor(Math.random() * available.length)];
      picked.push(first);
      usedIndices.add(items.indexOf(first));

      if (count > 1 && available.length > 1) {
        const firstTags = new Set(first.tags || []);
        // Try to find items with overlapping tags
        const related = available.filter(item => {
          if (item === first) return false;
          const itemTags = new Set(item.tags || []);
          return [...firstTags].some(t => itemTags.has(t));
        });

        if (related.length > 0) {
          // Shuffle and pick
          const shuffled = related.sort(() => Math.random() - 0.5);
          for (let i = 0; i < Math.min(count - 1, shuffled.length); i++) {
            picked.push(shuffled[i]);
            usedIndices.add(items.indexOf(shuffled[i]));
          }
        } else if (available.length > 1) {
          // Pick random unrelated items
          const others = available.filter(item => item !== first).sort(() => Math.random() - 0.5);
          for (let i = 0; i < Math.min(count - 1, others.length); i++) {
            picked.push(others[i]);
            usedIndices.add(items.indexOf(others[i]));
          }
        }
      }

      return picked;
    }

    function generateSingleNote(sourceItems, type) {
      if (!sourceItems || sourceItems.length === 0) return null;

      const template = XHS_TEMPLATES[type] || XHS_TEMPLATES.truth;
      const primaryItem = sourceItems[0];
      const secondaryItem = sourceItems[1];

      // Pick a random hook
      const hook = template.hooks[Math.floor(Math.random() * template.hooks.length)];

      // Build title based on primary item
      let title = generateTitle(primaryItem, type, hook);

      // Build content
      let content = generateContent(sourceItems, type, hook);

      // Build tags
      const allTags = [...new Set(sourceItems.flatMap(item => item.tags || []))];
      const xhsTags = generateXHSTags(allTags, type);

      // Full content with tags
      const fullContent = content + '\n\n' + xhsTags;

      // Image suggestion
      const imageSuggestion = generateImageSuggestion(sourceItems, type);

      // Sources
      const sources = sourceItems.map(item => ({
        title: item.title,
        url: item.sourceUrl || '',
        platform: item.platform || item.source || ''
      }));

      // Count
      const charCount = fullContent.length;

      return {
        type,
        title,
        content: fullContent,
        charCount,
        sourceCount: sources.length,
        sources,
        imageSuggestion,
        sourceItems: sourceItems.map(item => ({
          title: item.title,
          summary: item.summary,
          insight: item.insight,
          source: item.source,
          sourceUrl: item.sourceUrl,
          platform: item.platform,
          tags: item.tags,
          trust: item.trust,
          date: item.date
        }))
      };
    }

    function generateTitle(item, type, hook) {
      const insight = item.insight || item.summary || '';
      const nums = insight.match(/\d+[%％\d,万]+/g) || [];

      if (type === 'rant') {
        // 职场吐槽——标题要有代入感和冲突
        const titles = [
          '被问"你到底干啥的"，我沉默了',
          'HR不是只会走流程，但没人信',
          '说句得罪人的话',
          '做组织工作的人，最大的委屈不是累',
          '我们这个岗位，被误解太久了',
          '为什么没人觉得我们干的是正经事',
          '今天又被吐槽了，但我这次没忍住'
        ];
        return titles[Math.floor(Math.random() * titles.length)];
      } else if (type === 'truth') {
        // 行业真相——用数据制造悬念
        if (nums.length > 0) {
          const numStr = nums.slice(0, 2).join('和');
          const dataTitles = [
            `${numStr}，但大部分人不知道`,
            `一个数据，可能改变你对职场的看法`,
            `${numStr}，这跟你想的不一样`,
            `看到这组数据的时候我愣了一下`
          ];
          return dataTitles[Math.floor(Math.random() * dataTitles.length)];
        }
        const noDataTitles = [
          '一个你不知道的职场真相',
          '说个行业内不太想说的事实',
          '这事儿跟大多数人想的不一样'
        ];
        return noDataTitles[Math.floor(Math.random() * noDataTitles.length)];
      } else if (type === 'survive') {
        // 打工人生存——直击焦虑，给出希望
        const surviveTitles = [
          'AI来了，说点实在的',
          '不想被淘汰，先搞清楚这件事',
          '给你3个建议，关于未来3年',
          '很多人都在焦虑同一件事',
          '与其焦虑，不如先看看这个',
          '说几个我觉得比较重要的判断',
          '真正的铁饭碗，不是你以为的那样'
        ];
        return surviveTitles[Math.floor(Math.random() * surviveTitles.length)];
      } else if (type === 'opinion') {
        // 职场观点——有态度，引人讨论
        const opinionTitles = [
          '说个可能不太受欢迎的观点',
          '这个看法可能跟你想的不一样',
          '聊聊一个没人聊的角度',
          '这事儿其实没有标准答案',
          '我觉得关键问题不在这里',
          '换个角度想这件事',
          '说句大实话'
        ];
        return opinionTitles[Math.floor(Math.random() * opinionTitles.length)];
      }

      return item.title.replace(/[《》「」]/g, '').substring(0, 25);
    }

    function generateContent(sourceItems, type, hook) {
      const primary = sourceItems[0];
      const secondary = sourceItems[1];
      let content = '';

      // 开头直接用 hook，已经是场景化的了
      content += hook + '\n\n';

      if (type === 'rant') {
        // 职场吐槽：场景 → 误解 → 反转（用数据/洞察打脸）
        content += generateRantBody(sourceItems);
      } else if (type === 'truth') {
        // 行业真相：悬念 → 数据 → 反直觉结论
        content += generateTruthBody(sourceItems);
      } else if (type === 'survive') {
        // 打工人生存：焦虑场景 → 具体建议 → 行动项
        content += generateSurviveBody(sourceItems);
      } else if (type === 'opinion') {
        // 职场观点：争议话题 → 独特角度 → 留白引发讨论
        content += generateOpinionBody(sourceItems);
      }

      // 自然结尾，像在跟朋友聊天
      const closings = [
        '说多了，有人想聊可以在评论区说。',
        '也不一定对，就是把自己看到的写下来。',
        '下次再展开聊，这个话题能说很多。'
      ];
      content += '\n\n---\n' + closings[Math.floor(Math.random() * closings.length)];

      return content;
    }

    // ========== 职场吐槽型内容 ==========
    // 结构：共鸣场景 → 具体误解 → 用数据/洞察反转
    function generateRantBody(items) {
      const primary = items[0];
      const insight = primary.insight || primary.summary || '';
      const nums = insight.match(/\d+[%％\d,万]+/g) || [];

      // 中间展开——把误解说得具体
      const misunderstandings = [
        '其实每次听到这些话，我都想说但又不知道从哪说起。大家觉得这个岗位就是走流程、办手续，但真正做过的人知道，事情远不是这样。',
        '不是要解释什么，就是觉得挺无奈的。外界看到的是结果，看不到中间那些沟通、协调、反复打磨的部分。有些事情做成了，没人在意；做砸了，锅一定先甩过来。',
        '说实话，有时候连自己人都觉得这个工作没啥存在感。但每次看到数据的时候，又会觉得——算了，懂的人自然懂。'
      ];
      let body = misunderstandings[Math.floor(Math.random() * misunderstandings.length)];

      // 反转——用情报数据给出不一样的视角
      body += '\n\n';
      if (nums.length > 0) {
        const sentences = insight.split(/[。；]/).filter(s => s.trim().length > 15);
        if (sentences.length > 0) {
          const pick = sentences.slice(0, 2).map(s => s.trim().replace(/^[，、\s]+/, '')).join('。');
          body += '刚好最近看到一组数据：' + pick + '。\n\n';
        }
      } else {
        body += extractMainPoint(insight) + '\n\n';
      }

      const reversals = [
        '所以啊，事情从来不是表面看起来那么简单。',
        '下次再有人说"这工作谁都能干"，至少能拿出点东西说说。',
        '有些价值不在明面上，但你认真去做的时候，自己心里是有数的。'
      ];
      body += reversals[Math.floor(Math.random() * reversals.length)];

      return body;
    }

    // ========== 行业真相型内容 ==========
    // 结构：悬念 → 数据 → 反直觉结论
    function generateTruthBody(items) {
      const primary = items[0];
      const insight = primary.insight || primary.summary || '';
      const sentences = insight.split(/[。；]/).filter(s => s.trim().length > 12);

      let body = '';
      // 展开核心事实
      if (sentences.length > 0) {
        // 取2-3个有内容的句子，自然展开
        const pick = sentences.slice(0, 3).map(s => s.trim().replace(/^[，、\s]+/, ''));
        body = pick.join('。') + '。';
      } else {
        body = extractMainPoint(insight);
      }

      body += '\n\n';

      // 加入第二个来源（如果有）
      if (items[1]) {
        const sec = items[1].insight || items[1].summary || '';
        if (sec.length > 20) {
          const secSentences = sec.split(/[。；]/).filter(s => s.trim().length > 15);
          if (secSentences.length > 0) {
            body += '另一个数据也印证了这点：' + secSentences[0].trim().replace(/^[，、\s]+/, '') + '。\n\n';
          }
        }
      }

      // 反直觉的结论
      const conclusions = [
        '这跟网上大部分人说的不太一样。但数据不会骗人。',
        '说实话，看到这些数据之前，我自己也是那个"大部分人"。',
        '所以与其听别人怎么说，不如自己看看数据再判断。尤其是这种跟你饭碗直接相关的事。'

      body += conclusions[Math.floor(Math.random() * conclusions.length)];

      return body;
    }

    // ========== 打工人生存型内容 ==========
    // 结构：焦虑共鸣 → 具体洞察 → 可行动的建议
    function generateSurviveBody(items) {
      const primary = items[0];
      const insight = primary.insight || primary.summary || '';

      let body = '';

      // 先共情——把焦虑说具体
      const anxieties = [
        '焦虑归焦虑，但光焦虑没用。不如看看那些真正跑在前面的人都在做什么。',
        '我理解这种焦虑，因为我自己也时不时会有。但焦虑和行动之间，差的就是那么一点信息差。',
        '说句可能不太中听的话：大部分人的焦虑，来源于信息不足。你不知道该怕什么，也不知道该准备什么。'
      ];
      body += anxieties[Math.floor(Math.random() * anxieties.length)];

      body += '\n\n';

      // 从情报中提取有行动指导意义的内容
      const actionable = insight.split(/[。；]/)
        .filter(s => s.trim().length > 15 && (s.includes('建议') || s.includes('需要') || s.includes('应该') || s.includes('可以') || s.includes('能力') || s.includes('技能') || s.includes('关键') || s.includes('核心')))
        .map(s => s.trim().replace(/^[，、\s]+/, ''));

      if (actionable.length > 0) {
        const pick = actionable.slice(0, 3);
        const connectors = ['第一，', '其次，', '最后，'];
        body += pick.map((s, i) => (connectors[i] || '') + s).join('\n');
      } else {
        // 兜底：从情报中提取主要观点
        const sentences = insight.split(/[。；]/).filter(s => s.trim().length > 15);
        if (sentences.length > 0) {
          body += '最近看了不少资料，总结了几点我觉得比较有价值的判断：\n\n';
          body += sentences.slice(0, 3).map(s => s.trim().replace(/^[，、\s]+/, '')).join('。\n') + '。';
        } else {
          body += extractMainPoint(insight);
        }
      }

      body += '\n\n';

      const endings = [
        '不一定全对，但至少比焦虑有用。',
        '先记下来，慢慢消化。方向比速度重要。',
        '说到底，在这个变化的时代，保持学习能力和适应力，比什么都重要。'
      ];
      body += endings[Math.floor(Math.random() * endings.length)];

      return body;
    }

    // ========== 职场观点型内容 ==========
    // 结构：争议话题 → 独特角度 → 留白
    function generateOpinionBody(items) {
      const primary = items[0];
      const insight = primary.insight || primary.summary || '';

      let body = '';

      // 给出独特角度
      const angles = [
        '我的看法可能跟主流不太一样。',
        '这事儿其实没有标准答案，但我觉得有一个角度大家很少提到。',
        '聊这个话题容易得罪人，但我还是想说。'
      ];
      body += angles[Math.floor(Math.random() * angles.length)];

      body += '\n\n';

      // 从情报中提取核心观点
      const sentences = insight.split(/[。；]/).filter(s => s.trim().length > 12);
      if (sentences.length > 0) {
        const pick = sentences.slice(0, 3).map(s => s.trim().replace(/^[，、\s]+/, ''));
        body += pick.join('。') + '。';
      } else {
        body += extractMainPoint(insight);
      }

      // 如果有第二来源，加入对比
      if (items[1]) {
        const secInsight = items[1].insight || items[1].summary || '';
        const secSentences = secInsight.split(/[。；]/).filter(s => s.trim().length > 15);
        if (secSentences.length > 0) {
          body += '\n\n不过话说回来，' + secSentences[0].trim().replace(/^[，、\s]+/, '') + '。';
        }
      }

      body += '\n\n';

      const openEnds = [
        '这事儿没有绝对的对错，但我觉得至少值得想想。',
        '你们觉得呢？可以在评论区聊聊，不一定非要达成共识。',
        '先写到这里，这个话题下次可以展开写一篇。'
      ];
      body += openEnds[Math.floor(Math.random() * openEnds.length)];

      return body;
    }

    // 工具函数：从文本中提取主要观点
    function extractMainPoint(text) {
      if (!text) return '';
      const sentences = text.split(/[。；]/).filter(s => s.trim().length > 10);
      if (sentences.length === 0) return text.substring(0, 200);
      return sentences.slice(0, 2).map(s => s.trim().replace(/^[，、\s]+/, '')).join('。') + '。';
    }

    function extractKeywords(text) {
      if (!text) return [];
      const keywords = [];
      const patterns = [
        /[\u4e00-\u9fff]{2,6}(?:框架|模型|模式|机制|体系|策略|方法)/g,
        /[\u4e00-\u9fff]{2,4}(?:转型|变革|重塑|重构|升级|替代)/g,
        /\d+[%％]/g,
        /[\u4e00-\u9fff]{2,6}(?:核心|关键|重要|首要|主要)/g
      ];
      patterns.forEach(p => {
        const matches = text.match(p);
        if (matches) keywords.push(...matches.slice(0, 2));
      });
      return [...new Set(keywords)].slice(0, 4);
    }

    function extractTrendPoint(item) {
      const summary = item.summary || item.insight || '';
      // Extract first meaningful sentence
      const match = summary.match(/[^。？！]+[。？！]/);
      return match ? match[0].trim().substring(0, 80) : summary.substring(0, 80);
    }

    function extractDebatePoint(item) {
      const summary = item.summary || item.insight || '';
      const nums = summary.match(/\d+[%％\d,万]+/g);
      if (nums && nums.length > 0) {
        // Find sentence containing numbers
        const match = summary.match(/[^。？！]*\d+[^。？！]*[。？！]/);
        return match ? match[0].trim() : summary.substring(0, 100);
      }
      return summary.substring(0, 100);
    }

      html += `<form class="kb-archive-form" id="kbArchiveForm" onsubmit="handleKBArchive(event)">`;
      html += `<input type="url" class="kb-archive-input" id="kbArchiveUrl" placeholder="粘贴任意网页链接，Javis 将自动抓取存档..." required />`;
      html += `<button type="submit" class="kb-archive-btn" id="kbArchiveBtn">📥 存档</button>`;
      html += `</form>`;
      html += `<div class="kb-archive-note">💡 也可以直接发链接给 Javis 处理 · 支持公众号文章、网页报道、在线报告等</div>`;
      html += `<div id="kbArchiveResult"></div>`;
      html += `</div>`;

      // Upload tip
      html += `<div style="background: var(--surface); border-radius: 12px; padding: 14px 16px; margin-bottom: 16px; border: 1px solid var(--border);">`;
      html += `<div style="font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px;">📄 上传 PDF/文档</div>`;
      html += `<div style="font-size:12px; color:var(--text2); line-height:1.6;">将文件或文件路径发给 Javis，自动解析内容、分类、生成摘要并纳入知识库。</div>`;
      html += `</div>`;

      // Filters
      html += `<div class="kb-filters">`;
      html += `<span class="kb-filter-label">来源：</span>`;
      html += `<span class="kb-filter-tag ${!kbSourceTypeFilter ? 'active' : ''}" onclick="setKBSourceFilter(null)">全部 (${kbReports.length})</span>`;
      sourceTypes.forEach(([key, info]) => {
        const count = sourceCounts[key] || 0;
        if (count > 0) {
          html += `<span class="kb-filter-tag ${kbSourceTypeFilter === key ? 'active' : ''}" onclick="setKBSourceFilter('${key}')">${info.icon} ${info.label} (${count})</span>`;
        }
      });
      html += `</div>`;
      html += `<div class="kb-filters">`;
      html += `<span class="kb-filter-label">主题：</span>`;
      html += `<span class="kb-filter-tag ${!kbTopicFilter ? 'active' : ''}" onclick="setKBTopicFilter(null)">全部</span>`;
      topicTags.forEach(([tag, icon]) => {
        const count = topicCounts[tag] || 0;
        if (count > 0) {
          html += `<span class="kb-filter-tag ${kbTopicFilter === tag ? 'active' : ''}" onclick="setKBTopicFilter('${tag}')">${icon} ${tag} (${count})</span>`;
        }
      });
      html += `</div>`;

      // Search
      html += `<div class="search-wrap" style="margin-bottom: 16px;">`;
      html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
      html += `<input type="text" class="kb-search-box" id="kbSearchBox" placeholder="搜索报告标题、描述、主题..." oninput="renderKBCards()" />`;
      html += `</div>`;

      // Stats
      const filteredCount = getFilteredKBReports().length;
      html += `<div class="kb-stats">共 <strong>${kbReports.length}</strong> 份报告${filteredCount !== kbReports.length ? ` · 当前显示 <strong>${filteredCount}</strong> 份` : ''}</div>`;

      // Cards
      html += `<div id="kbCards"></div>`;
      container.innerHTML = html;
      renderKBCards();
    }

    function getFilteredKBReports() {
      const query = document.getElementById('kbSearchBox') ? document.getElementById('kbSearchBox').value.toLowerCase().trim() : '';
      return kbReports.filter(r => {
        if (kbSourceTypeFilter && r.sourceType !== kbSourceTypeFilter) return false;
        if (kbTopicFilter && !(r.topics || []).includes(kbTopicFilter)) return false;
        if (query) {
          const haystack = [r.title, r.description, r.author, r.publisher, ...(r.topics || [])].join(' ').toLowerCase();
          return haystack.includes(query);
        }
        return true;
      });
    }

    function renderKBCards() {
      const cardsContainer = document.getElementById('kbCards');
      if (!cardsContainer) return;
      const filtered = getFilteredKBReports();

      // Update stats
      const statsEl = cardsContainer.previousElementSibling;
      if (statsEl) {
        const filteredCount = filtered.length;
        statsEl.innerHTML = `共 <strong>${kbReports.length}</strong> 份报告${filteredCount !== kbReports.length ? ` · 当前显示 <strong>${filteredCount}</strong> 份` : ''}`;
      }

      if (filtered.length === 0) {
        cardsContainer.innerHTML = `<div class="kb-empty"><div class="kb-empty-icon">📚</div><h3>${kbReports.length === 0 ? '知识库为空' : '未找到匹配报告'}</h3><p>${kbReports.length === 0 ? '将报告文件发给 Javis，即可自动解析分类并纳入知识库。' : '试试调整搜索条件或筛选器'}</p></div>`;
        return;
      }

      let html = '<div class="kb-grid">';
      filtered.forEach(report => {
        const typeInfo = KB_SOURCE_TYPES[report.sourceType] || KB_SOURCE_TYPES.industry;
        const topicIcons = (report.topics || []).map(t => {
          const icon = KB_TOPIC_TAGS[t] || '📌';
          return `<span class="kb-card-tag">${icon} ${t}</span>`;
        }).join('');

        html += `<div class="kb-card" onclick="openKBReader('${esc(report.id)}')">`;
        html += `<div class="kb-card-header">`;
        html += `<div class="kb-card-icon ${typeInfo.class}">${typeInfo.icon}</div>`;
        html += `<span class="kb-card-type ${typeInfo.class}">${typeInfo.label}</span>`;
        html += `</div>`;
        html += `<div class="kb-card-title">${esc(report.title)}</div>`;
        html += `<div class="kb-card-desc">${esc(report.description)}</div>`;
        html += `<div class="kb-card-meta">`;
        html += topicIcons;
        if (report.date) html += `<span class="kb-card-date">${esc(report.date)}</span>`;
        html += `</div>`;
        if (report.author) {
          html += `<div class="kb-card-file">✍️ ${esc(report.author)}${report.publisher ? ' · ' + esc(report.publisher) : ''}</div>`;
        }
        if (report.fileName) {
          html += `<div class="kb-card-file">📎 ${esc(report.fileName)}${report.fileSize ? ' (' + esc(report.fileSize) + ')' : ''}</div>`;
        }
        html += `</div>`;
      });
      html += '</div>';
      cardsContainer.innerHTML = html;
    }

    function setKBSourceFilter(type) {
      kbSourceTypeFilter = type;
      renderKBPage();
    }
    function setKBTopicFilter(topic) {
      kbTopicFilter = topic;
      renderKBPage();
    }

    // ============================================================
    // KB Reader
    // ============================================================
    function openKBReader(reportId) {
      const report = kbReports.find(r => r.id === reportId);
      if (!report) return;

      const typeInfo = KB_SOURCE_TYPES[report.sourceType] || KB_SOURCE_TYPES.industry;

      // Fill header
      document.getElementById('kbReaderType').textContent = typeInfo.label;
      document.getElementById('kbReaderType').className = 'kb-reader-type ' + typeInfo.class;
      document.getElementById('kbReaderTitle').textContent = report.title;
      const metaParts = [];
      if (report.author) metaParts.push(report.author);
      if (report.publisher) metaParts.push(report.publisher);
      if (report.date) metaParts.push(report.date);
      document.getElementById('kbReaderMeta').textContent = metaParts.join(' · ');

      // Actions
      const actionsEl = document.getElementById('kbReaderActions');
      let actionsHtml = '';
      if (report.pdfFile) {
        actionsHtml += `<a href="${esc(report.pdfFile)}" class="btn-primary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;" target="_blank">📄 下载原文 PDF</a>`;
      }
      if (report.originalUrl) {
        actionsHtml += `<a href="${esc(report.originalUrl)}" class="btn-secondary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;" target="_blank">🔗 阅读原文</a>`;
      }
      actionsEl.innerHTML = actionsHtml;

      // Topics
      const topicsEl = document.getElementById('kbReaderTopics');
      topicsEl.innerHTML = (report.topics || []).map(t => `<span class="kb-reader-topic-tag">${KB_TOPIC_TAGS[t] || '📌'} ${esc(t)}</span>`).join('');

      // Content (load summary)
      const contentEl = document.getElementById('kbReaderContent');
      contentEl.innerHTML = '<div class="kb-reader-loading">⏳ 加载摘要内容中...</div>';

      // Load summary markdown if available
      if (report.summaryFile) {
        fetch(report.summaryFile)
          .then(r => r.text())
          .then(md => { contentEl.innerHTML = mdToHtml(md); })
          .catch(() => {
            contentEl.innerHTML = `<p style="color:var(--text2);font-size:13px;">📋 ${esc(report.description || '暂无摘要内容')}</p>`;
          });
      } else {
        contentEl.innerHTML = `<p style="color:var(--text2);font-size:13px;">📋 ${esc(report.description || '暂无摘要内容')}</p>`;
      }

      // Open overlay
      document.getElementById('kbReaderOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeKBReader() {
      document.getElementById('kbReaderOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function mdToHtml(md) {
      if (!md) return '';
      let html = md
        // Remove the title comment block at the top
        .replace(/^> \*\*原标题\*\*.*?\n> \*\*发布日期\*\*.*?\n\n---\n\n/, '')
        // H1
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // H2
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        // H3
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        // HR
        .replace(/^---$/gm, '<hr>')
        // Blockquote (single line)
        .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Unordered list items
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        // Ordered list items
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // Wrap consecutive <li> in <ul>
        .replace(/(<li>.*<\/li>\n?)+/g, match => '<ul>' + match + '</ul>')
        // Paragraphs: wrap non-tag lines
        .split('\n\n')
        .map(block => {
          block = block.trim();
          if (!block) return '';
          if (/^<(h[1-3]|ul|ol|blockquote|hr|div)/.test(block)) return block;
          if (block.startsWith('<ul>') || block.startsWith('<ol>')) return block;
          return `<p>${block}</p>`;
        })
        .join('\n');
      return html;
    }

    // ============================================================
    // KB URL Archive
    // ============================================================
    function handleKBArchive(event) {
      event.preventDefault();
      const url = document.getElementById('kbArchiveUrl').value.trim();
      if (!url) return;

      const btn = document.getElementById('kbArchiveBtn');
      const resultEl = document.getElementById('kbArchiveResult');
      btn.disabled = true;
      btn.textContent = '⏳ 处理中...';
      resultEl.innerHTML = '';

      // Since GitHub Pages is static, we show instructions for Javis to process
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '📥 存档';
        resultEl.innerHTML = `
          <div class="kb-archive-result success">
            ✅ 链接已记录：<strong>${esc(url)}</strong><br>
            请将此链接发送给 Javis，我将自动抓取内容、解析归档，纳入知识库。
          </div>
        `;
        document.getElementById('kbArchiveUrl').value = '';
      }, 600);
    }

    // ============================================================
    // Init
    // ============================================================
    document.getElementById('searchBox').addEventListener('input', renderInfoList);
    loadData();
  </script>
</body>
</html>
