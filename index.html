<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OD 情报中心 · AI 组织设计研究</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242837;
      --surface3: #2a2f40;
      --border: #2e3348;
      --text: #e1e4ed;
      --text2: #8b91a8;
      --accent: #6c8cff;
      --accent2: #a78bfa;
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --orange: #fbbf24;
      --red: #f87171;
      --trust-high: #fbbf24;
      --trust-mid: #60a5fa;
      --trust-ref: #a78bfa;

    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1d27 0%, #242837 100%);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 24px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text2);
    }
    .header-stats strong { color: var(--accent); font-weight: 600; }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 3px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    
    .tab-btn.kb-tab.active {
      background: var(--orange);
      color: #000;
    }
    
    
    
    .tab-btn .badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      font-weight: 600;
    }
    .tab-btn.active .badge {
      background: rgba(255,255,255,0.25);
    }

    /* Page visibility */
    .page { display: none; }
    .page.active { display: block; }

    /* =================== Information Page =================== */
    .controls {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 24px;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 13px;
      color: var(--text2);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .filter-tag {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-tag:hover { border-color: var(--accent); color: var(--text); }
    .filter-tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-tag.trust-high.active { background: var(--trust-high); border-color: var(--trust-high); color: #000; }
    .filter-tag.trust-mid.active { background: var(--trust-mid); border-color: var(--trust-mid); color: #fff; }
    .filter-tag.trust-ref.active { background: var(--trust-ref); border-color: var(--trust-ref); color: #fff; }
    .filter-tag.source-tag.active { background: var(--green); border-color: var(--green); color: #000; }
    .stats {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text2);
    }
    .stats strong { color: var(--accent); }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* Day Group */
    .day-group { margin-top: 32px; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .day-header h2 { font-size: 17px; font-weight: 600; color: var(--text); }
    .day-count {
      font-size: 12px;
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 12px;
      color: var(--text2);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 16px rgba(108, 140, 255, 0.08);
      transform: translateY(-1px);
    }
    .card.active {
      border-color: var(--green);
      box-shadow: 0 4px 24px rgba(52, 211, 153, 0.1);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title-area { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }
    .card-brief {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-trust-mini {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }
    .trust-high { background: rgba(251, 191, 36, 0.15); color: var(--trust-high); }
    .trust-mid { background: rgba(96, 165, 250, 0.15); color: var(--trust-mid); }
    .trust-ref { background: rgba(167, 139, 250, 0.15); color: var(--trust-ref); }
    .card-expand-icon {
      width: 20px;
      height: 20px;
      color: var(--text2);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .card.active .card-expand-icon {
      transform: rotate(180deg);
      color: var(--green);
    }
    .card-meta-mini {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text2);
    }

    /* Reader Panel */
    .reader-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.3s ease;
      margin-top: 0;
    }
    .reader-panel.open {
      max-height: 1200px;
      opacity: 1;
      margin-top: 4px;
    }
    .reader-inner { padding: 24px; }
    .reader-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .reader-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.3;
      line-height: 1;
      flex-shrink: 0;
    }
    .reader-title { font-size: 18px; font-weight: 700; line-height: 1.5; }
    .reader-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .reader-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text2);
    }
    .reader-meta-item strong { color: var(--text); font-weight: 500; }
    .reader-section { margin-bottom: 16px; }
    .reader-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .reader-section-label .icon { width: 16px; height: 16px; }
    .reader-summary { font-size: 15px; line-height: 1.8; }
    .reader-insight {
      font-size: 15px;
      color: var(--green);
      background: var(--green-dim);
      padding: 16px 18px;
      border-radius: 10px;
      border-left: 4px solid var(--green);
      line-height: 1.8;
    }
    .reader-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .reader-tag {
      font-size: 12px;
      padding: 4px 10px;
      background: var(--surface);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .reader-tag:hover { background: var(--border); color: var(--text); }
    .reader-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .btn-read-original {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-read-original:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-close-panel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-close-panel:hover { border-color: var(--text2); color: var(--text); }
    
    

    /* Source coverage bar */
    .coverage {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .coverage-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .coverage-bar { display: flex; flex-wrap: wrap; gap: 6px; }
    .coverage-item {
      font-size: 11px;
      padding: 3px 8px;
      background: var(--surface2);
      border-radius: 12px;
      color: var(--text2);
    }
    .coverage-item.active {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
    }
    .coverage-count { color: var(--text); font-weight: 600; }

    /* =================== Daily Report Page =================== */
    .report-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }
    .report-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .report-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .report-stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }
    .report-stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* =================== Master Report Banner =================== */
    .master-report-banner {
      background: linear-gradient(135deg, #1a1d27 0%, #232840 100%);
      border: 1px solid var(--accent);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 28px;
      position: relative;
      overflow: hidden;
    }
    .master-report-banner::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--green));
    }
    .master-report-banner-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(108, 140, 255, 0.15);
      color: var(--accent);
      border: 1px solid rgba(108, 140, 255, 0.3);
      margin-bottom: 10px;
    }
    .master-report-banner h2 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
    }
    .master-report-banner .subtitle {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 14px;
    }
    .master-report-stats {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .master-report-stat {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
    }
    .master-report-stat strong { color: var(--text); font-weight: 600; }
    .sub-props-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }
    .sub-prop-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
    }
    .sub-prop-chip-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sub-prop-chip-finding { font-size: 11px; color: var(--text2); line-height: 1.4; }
    .sub-prop-chip.high { border-left: 3px solid var(--red); }
    .sub-prop-chip.medium { border-left: 3px solid var(--orange); }
    .master-report-insights { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    .master-report-insight {
      font-size: 13px;
      color: var(--text);
      padding: 6px 10px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      border-left: 3px solid var(--accent);
    }
    .master-report-actions { display: flex; gap: 10px; flex-wrap: wrap; }
    .master-report-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      text-decoration: none;
      transition: all 0.2s;
    }
    .master-report-btn-primary { background: var(--accent); color: #fff; }
    .master-report-btn-primary:hover { background: #5a7ae0; }
    .master-report-btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .master-report-btn-secondary:hover { border-color: var(--accent); }

    .trust-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface2);
      margin: 12px 0;
    }
    .trust-bar-seg { height: 100%; transition: width 0.4s ease; }
    .trust-bar-seg.high { background: var(--trust-high); }
    .trust-bar-seg.mid { background: var(--trust-mid); }
    .trust-bar-seg.ref { background: var(--trust-ref); }
    .trust-legend { display: flex; gap: 16px; font-size: 12px; color: var(--text2); }
    .trust-legend-item { display: flex; align-items: center; gap: 4px; }
    .trust-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .report-timeline { position: relative; padding-left: 28px; }
    .report-timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .report-day { position: relative; margin-bottom: 24px; }
    .report-day-dot {
      position: absolute;
      left: -24px;
      top: 16px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }
    .report-day-dot.today {
      background: var(--green);
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
    }
    .report-day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .report-day-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(108, 140, 255, 0.08);
    }
    .report-day-card.expanded { border-color: var(--green); }
    .report-day-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .report-day-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .report-day-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--green-dim);
      color: var(--green);
      font-weight: 500;
    }
    .report-day-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text2);
      flex-shrink: 0;
    }
    .report-day-meta strong { color: var(--text); font-weight: 500; }
    .report-day-expand {
      width: 20px;
      height: 20px;
      color: var(--text2);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .report-day-card.expanded .report-day-expand {
      transform: rotate(180deg);
      color: var(--green);
    }
    .report-day-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .report-day-card.expanded .report-day-body { max-height: 3000px; }
    .report-day-content {
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }
    .report-section { margin-top: 20px; }
    .report-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .source-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .source-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--text2);
      font-weight: 500;
      font-size: 12px;
    }
    .source-table th:first-child { border-radius: 6px 0 0 6px; }
    .source-table th:last-child { border-radius: 0 6px 6px 0; }
    .source-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .pick-item {
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 3px solid var(--green);
      transition: border-color 0.2s;
    }
    .pick-item:hover { border-left-color: var(--accent); }
    .pick-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .pick-meta { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .pick-reason { font-size: 13px; color: var(--green); line-height: 1.5; }
    .pick-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      margin-top: 4px;
    }
    .pick-link:hover { text-decoration: underline; }
    .trend-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-num { font-size: 14px; font-weight: 700; color: var(--accent); opacity: 0.5; flex-shrink: 0; width: 20px; }
    .trend-text { font-size: 14px; line-height: 1.6; }
    .focus-item { display: flex; gap: 10px; padding: 8px 0; }
    .focus-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 8px; }
    .focus-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .report-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .report-tag { font-size: 11px; padding: 3px 10px; background: var(--surface2); border-radius: 12px; color: var(--text2); }

      .kb-archive-input { min-width: unset; }
    }
  </style>
  <script>
    // ========== 反爬虫核心逻辑 ==========
    const AntiBot = {
      config: {
        minViewTime: 2000,
        maxClicksPerSec: 3,
        blockedPatterns: [
          /headless/i, /phantomjs/i, /selenium/i, /puppeteer/i, /playwright/i,
          /webdriver/i, /crawl/i, /scrapy/i, /bot/i, /spider/i, /hack/i
        ],
        blockeduas: ['curl', 'wget', 'python-requests', 'httpclient', 'java/', 'libwww']
      },
      state: {
        startTime: Date.now(),
        clickCount: 0,
        lastClickTime: Date.now(),
        isHuman: false,
        isBlocked: false,
        contentLocked: true
      },
      
      detectHeadless() {
        const signs = [
          navigator.webdriver === true,
          window.callPhantom || window._phantom,
          document.documentElement.getAttribute('webdriver'),
          window.navigator.userAgent.toLowerCase().includes('headless'),
          navigator.plugins.length === 0 && navigator.mimeTypes === undefined,
          !window.outerWidth && !window.outerHeight,
          screen.width === 0 && screen.height === 0,
          window.document.__webdriver_evaluate || window.document.__selenium_evaluate,
        ];
        return signs.some(s => s === true);
      },
      
      checkUserAgent(ua) {
        ua = ua.toLowerCase();
        for (const pattern of this.config.blockedPatterns) {
          if (pattern.test(ua)) return true;
        }
        for (const block of this.config.blockeduas) {
          if (ua.startsWith(block)) return true;
        }
        return false;
      },
      
      checkClickFrequency() {
        const now = Date.now();
        const timeSinceLastClick = now - this.state.lastClickTime;
        if (timeSinceLastClick < 1000 / this.config.maxClicksPerSec) {
          this.state.clickCount++;
          if (this.state.clickCount > 10) return true;
        } else {
          this.state.clickCount = Math.max(0, this.state.clickCount - 1);
        }
        this.state.lastClickTime = now;
        return false;
      },
      
      unlockContent() {
        if (this.state.contentLocked) {
          this.state.contentLocked = false;
          this.state.isHuman = true;
          const overlay = document.getElementById('botCheck');
          if (overlay) {
            overlay.style.opacity = '0';
            overlay.style.transition = 'opacity 0.5s';
            setTimeout(() => overlay.remove(), 500);
          }
        }
      },
      
      blockAccess() {
        if (this.state.isBlocked) return;
        this.state.isBlocked = true;
        document.body.innerHTML = `
          <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1117;color:#e1e4ed;font-family:-apple-system,system-ui,sans-serif;text-align:center;padding:20px;">
            <div><h2 style="font-size:24px;margin-bottom:16px;">访问受限</h2><p style="color:#8b91a8;">检测到异常访问行为，内容已保护。</p></div>
          </div>
        `;
      },
      
      init() {
        if (this.checkUserAgent(navigator.userAgent)) {
          this.blockAccess();
          return;
        }
        
        document.addEventListener('click', () => {
          if (this.checkClickFrequency()) {
            this.blockAccess();
            return;
          }
          const viewTime = Date.now() - this.state.startTime;
          if (viewTime >= this.config.minViewTime) {
            this.unlockContent();
          }
        });
        
        let scrollCount = 0;
        document.addEventListener('scroll', () => {
          scrollCount++;
          const viewTime = Date.now() - this.state.startTime;
          if (scrollCount >= 3 && viewTime >= this.config.minViewTime) {
            this.unlockContent();
          }
        });
        
        document.addEventListener('keydown', () => {
          const viewTime = Date.now() - this.state.startTime;
          if (viewTime >= this.config.minViewTime) {
            this.unlockContent();
          }
        });
        
        setTimeout(() => {
          if (this.state.contentLocked) {
            const viewTime = Date.now() - this.state.startTime;
            if (viewTime >= this.config.minViewTime) {
              this.unlockContent();
            }
          }
        }, this.config.minViewTime + 500);
      }
    };
    
    document.addEventListener('DOMContentLoaded', () => AntiBot.init());
    
    // 禁用右键
    document.addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });
    
    // 禁用 F12/Ctrl+U
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'u') e.preventDefault();
      if (e.key === 'F12') e.preventDefault();
    });
  </script>
</head>
<body>
  <!-- 反爬虫遮罩 -->
  <div id="botCheck" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,17,23,0.98);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e1e4ed;text-align:center;padding:40px;font-family:-apple-system,system-ui,sans-serif;">
    <div style="width:40px;height:40px;border:3px solid #2e3348;border-top-color:#6c8cff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:24px;"></div>

  <!-- =================== Info Page =================== -->
  <div class="page active" id="page-info">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" class="search-box" id="searchBox" placeholder="搜索标题、摘要、OD启示、来源、标签..." />

  <!-- =================== KB Reader Overlay =================== -->
  <div class="kb-reader-overlay" id="kbReaderOverlay" onclick="if(event.target===this)closeKBReader()">

  <div class="footer">
    由 Javis 自动维护 · 数据存储于 <code>/ai-org-research/</code> · 覆盖 40+ 信息源 · 如有问题找老J家兄弟
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // State
    // ============================================================
    let allDays = [];
    let allReports = [];
    let masterReport = null;
    let kbReports = [];
    let currentTab = 'info';
    let activeTagFilter = null;
    let activeSourceFilter = null;
    let activeTrustFilter = null;
    let openCardId = null;
    let expandedReportDate = null;
    let isGenerating = false;
    let kbSourceTypeFilter = null;
    let kbTopicFilter = null;

    const PLATFORM_CATEGORIES = {
      '国内媒体': ['36氪', '机器之心', '钛媒体', '虎嗅', '界面新闻', '第一财经', '晚点LatePost', '新智元', '量子位', '新浪财经', '搜狐', '每日经济新闻'],
      '国际媒体': ['Hacker News', 'TechCrunch', 'The Verge', 'Wired', 'MIT Technology Review', 'Bloomberg', 'Reuters', 'WinBuzzer', 'siuleeboss'],
      '咨询公司': ['McKinsey', 'BCG', 'Bain', 'Mercer', 'Aon', 'Deloitte', '德勤', 'PwC', 'EY', 'Capgemini', 'WTW', 'Gartner'],
      '学术机构': ['HBR', 'HBS', 'Harvard', 'Stanford HAI', 'MIT CSAIL', 'MIT', 'arXiv', 'SSRN'],
      '行业研究': ['HRTech', 'InfoQ', '火山引擎', 'CCF'],
      '社交平台': ['小红书', '微信公众号', '知乎', '即刻', 'LinkedIn', 'Twitter/X', 'Reddit', '百度百家']
    };

    const TRUST_LEVELS = {
      '⭐高': { label: '⭐ 官方/学术/权威', class: 'trust-high', key: 'high' },
      '📰较高': { label: '📰 知名媒体', class: 'trust-mid', key: 'mid' },
      '💬参考': { label: '💬 社交/社区', class: 'trust-ref', key: 'ref' }
    };

    // ============================================================
    // Utility
    // ============================================================
    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }
    function highlightText(text, query) {
      if (!query || !text) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ============================================================
    // Tab Switching
    // ============================================================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active',
          (i === 0 && tab === 'info') ||
          (i === 1 && tab === 'report') ||
          (i === 2 && tab === 'kb'));
      });
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${tab}`).classList.add('active');
      if (tab === 'kb') renderKBPage();
    }

    // ============================================================
    // Parser
    // ============================================================
    function parseDigest(markdown) {
      const lines = markdown.split('\n');
      let currentDay = null;
      let currentItem = null;
      const days = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.includes('<!--')) continue;
        const dayMatch = line.match(/^## (\d{4}-\d{2}-\d{2})/);
        if (dayMatch) {
          if (currentDay && currentDay.items.length > 0) days.push(currentDay);
          currentDay = { date: dayMatch[1], items: [] };
          currentItem = null;
          continue;
        }
        if (!currentDay) continue;
        const titleMatch = line.match(/^### \[(\d+)\]\s+(.+)/);
        if (titleMatch) {
          currentItem = {
            id: titleMatch[1], title: titleMatch[2],
            summary: '', source: '', sourceUrl: '', platform: '',
            trust: '', insight: '', tags: [], time: ''
          };
          currentDay.items.push(currentItem);
          continue;
        }
        if (!currentItem) continue;
        const summaryMatch = line.match(/^- \*\*事件摘要\*\*[：:]\s*(.+)/);
        if (summaryMatch) { currentItem.summary = summaryMatch[1]; continue; }
        const sourceMatch = line.match(/^- \*\*来源\*\*[：:]\s*(.+)/);
        if (sourceMatch) {
          const raw = sourceMatch[1].trim();
          const mdLinkMatch = raw.match(/^\[([^\]]*)\]\(([^)]+)\)$/);
          if (mdLinkMatch) {
            currentItem.source = mdLinkMatch[1];
            currentItem.sourceUrl = mdLinkMatch[2];
          } else {
            const parenMatch = raw.match(/^(.+?)[（(](.+?)[）)]/);
            if (parenMatch) {
              currentItem.source = parenMatch[1].trim();
              currentItem.sourceUrl = parenMatch[2].trim();
            } else {
              currentItem.source = raw;
            }
          }
          continue;
        }
        const platformMatch = line.match(/^- \*\*来源平台\*\*[：:]\s*(.+)/);
        if (platformMatch) { currentItem.platform = platformMatch[1].trim(); continue; }
        const trustMatch = line.match(/^- \*\*来源可信度\*\*[：:]\s*(.+)/);
        if (trustMatch) { currentItem.trust = trustMatch[1].trim(); continue; }
        const insightMatch = line.match(/^- \*\*OD启示\*\*[：:]\s*(.+)/);
        if (insightMatch) { currentItem.insight = insightMatch[1]; continue; }
        const tagMatch = line.match(/^- \*\*标签\*\*[：:]\s*(.+)/);
        if (tagMatch) {
          currentItem.tags = tagMatch[1].match(/#[\w\u4e00-\u9fff-]+/g) || [];
          currentItem.tags = currentItem.tags.map(t => t.replace('#', ''));
          continue;
        }
        const timeMatch = line.match(/^- \*\*抓取时间\*\*[：:]\s*(.+)/);
        if (timeMatch) { currentItem.time = timeMatch[1]; continue; }
      }
      if (currentDay && currentDay.items.length > 0) days.push(currentDay);
      return days;
    }

    // ============================================================
    // Load
    // ============================================================
    async function loadData() {
      try {
        const resp = await fetch('./digest.md');
        if (resp.ok) {
          const text = await resp.text();
          allDays = parseDigest(text);
        }
      } catch (e) { console.log('digest.md not loaded'); }

      try {
        const resp = await fetch('./daily-report/digest.json');
        if (resp.ok) {
          const data = await resp.json();
          allReports = (data.reports || []).sort((a, b) => b.date.localeCompare(a.date));
          masterReport = data.masterReport || null;
        }
      } catch (e) { console.log('digest.json not loaded'); }

      // Try loading knowledge base catalog
      try {
        const resp = await fetch('./knowledge/catalog.json');
        if (resp.ok) {
          const data = await resp.json();
          kbReports = data.reports || [];
        }
      } catch (e) { console.log('kb catalog not loaded'); }

      updateBadges();
      renderInfoPage();
      renderReportPage();
    }

    function updateBadges() {
      const totalItems = allDays.reduce((s, d) => s + d.items.length, 0);
      document.getElementById('infoBadge').textContent = totalItems;
      document.getElementById('reportBadge').textContent = allReports.length;
      document.getElementById('kbBadge').textContent = kbReports.length;

      const totalDays = allDays.length;
      const totalSources = new Set();
      allDays.forEach(d => d.items.forEach(item => {
        totalSources.add(item.platform || item.source || '');
      }));
      document.getElementById('headerStats').innerHTML =
        `<span>📅 <strong>${totalDays}</strong> 天</span>` +
        `<span>📄 <strong>${totalItems}</strong> 条</span>` +
        `<span>📡 <strong>${totalSources.size}</strong> 源</span>`;
    }

    // ============================================================
    // Info Page Renderers
    // ============================================================
    function getAllTags() {
      const tagSet = new Set();
      allDays.forEach(d => d.items.forEach(item => item.tags.forEach(t => tagSet.add(t))));
      return Array.from(tagSet).sort();
    }
    function getAllPlatforms() {
      const srcMap = new Map();
      allDays.forEach(d => d.items.forEach(item => {
        const p = item.platform || item.source || '未知';
        srcMap.set(p, (srcMap.get(p) || 0) + 1);
      }));
      return Array.from(srcMap.entries()).sort((a, b) => b[1] - a[1]);
    }
    function getTrustStats() {
      const stats = { '⭐高': 0, '📰较高': 0, '💬参考': 0, '': 0 };
      allDays.forEach(d => d.items.forEach(item => {
        const t = item.trust || '';
        if (stats[t] !== undefined) stats[t]++;
        else stats['']++;
      }));
      return stats;
    }
    function renderTrustFilters() {
      const container = document.getElementById('trustFilters');
      const stats = getTrustStats();
      let html = '<span class="filter-label">可信度：</span>';
      html += `<span class="filter-tag ${!activeTrustFilter ? 'active' : ''}" onclick="setTrustFilter(null)">全部</span>`;
      for (const [key, info] of Object.entries(TRUST_LEVELS)) {
        const count = stats[key] || 0;
        if (count > 0) {
          html += `<span class="filter-tag ${info.class} ${activeTrustFilter === key ? 'active' : ''}" onclick="setTrustFilter('${key}')">${info.label} (${count})</span>`;
        }
      }
      container.innerHTML = html;
    }
    function renderSourceFilters() {
      const container = document.getElementById('sourceFilters');
      const platforms = getAllPlatforms();
      if (platforms.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="filter-label">来源：</span>';
      html += `<span class="filter-tag source-tag ${!activeSourceFilter ? 'active' : ''}" onclick="setSourceFilter(null)">全部</span>`;
      platforms.forEach(([name, count]) => {
        html += `<span class="filter-tag source-tag ${activeSourceFilter === name ? 'active' : ''}" onclick="setSourceFilter('${name.replace(/'/g, "\\'")}')">${esc(name)} (${count})</span>`;
      });
      container.innerHTML = html;
    }
    function renderTagFilters() {
      const container = document.getElementById('tagFilters');
      const tags = getAllTags();
      if (tags.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="filter-label">标签：</span>';
      html += `<span class="filter-tag ${!activeTagFilter ? 'active' : ''}" onclick="setTagFilter(null)">全部</span>`;
      tags.forEach(tag => {
        html += `<span class="filter-tag ${activeTagFilter === tag ? 'active' : ''}" onclick="setTagFilter('${tag}')">#${esc(tag)}</span>`;
      });
      container.innerHTML = html;
    }
    function renderCoverage() {
      const container = document.getElementById('coverage');
      const platforms = getAllPlatforms();
      if (platforms.length === 0) { container.innerHTML = ''; return; }
      let html = '<div class="coverage-title">📊 来源覆盖情况（' + platforms.length + ' 个平台）</div><div class="coverage-bar">';
      for (const [cat, expectedPlatforms] of Object.entries(PLATFORM_CATEGORIES)) {
        for (const ep of expectedPlatforms) {
          const found = platforms.find(([name]) => name.includes(ep));
          html += `<span class="coverage-item ${found ? 'active' : ''}">${ep}${found ? ` <span class="coverage-count">(${found[1]})</span>` : ''}</span>`;
        }
      }
      html += '</div>';
      container.innerHTML = html;
    }
    function setTrustFilter(trust) { activeTrustFilter = trust; renderInfoPage(); }
    function setSourceFilter(source) { activeSourceFilter = source; renderInfoPage(); }
    function setTagFilter(tag) { activeTagFilter = tag; renderInfoPage(); }
    function toggleCard(date, id) {
      const cardKey = `${date}-${id}`;

    function getFilteredKBReports() {
      const query = document.getElementById('kbSearchBox') ? document.getElementById('kbSearchBox').value.toLowerCase().trim() : '';

        if (kbSourceTypeFilter && r.sourceType !== kbSourceTypeFilter) return false;

        if (query) {
          const haystack = [r.title, r.description, r.author, r.publisher, ...(r.topics || [])].join(' ').toLowerCase();
          return haystack.includes(query);
        }
        return true;
      });
    }

      const statsEl = cardsContainer.previousElementSibling;
      if (statsEl) {
        const filteredCount = filtered.length;
        statsEl.innerHTML = `共 <strong>${kbReports.length}</strong> 份报告${filteredCount !== kbReports.length ? ` · 当前显示 <strong>${filteredCount}</strong> 份` : ''}`;
      }

      if (filtered.length === 0) {
        cardsContainer.innerHTML = `<div class="kb-empty"><div class="kb-empty-icon">📚</div><h3>${kbReports.length === 0 ? '知识库为空' : '未找到匹配报告'}</h3><p>${kbReports.length === 0 ? '将报告文件发给 Javis，即可自动解析分类并纳入知识库。' : '试试调整搜索条件或筛选器'}</p></div>`;
        return;
      }

      let html = '<div class="kb-grid">';
      filtered.forEach(report => {
        const typeInfo = KB_SOURCE_TYPES[report.sourceType] || KB_SOURCE_TYPES.industry;
        const topicIcons = (report.topics || []).map(t => {
          const icon = KB_TOPIC_TAGS[t] || '📌';
          return `<span class="kb-card-tag">${icon} ${t}</span>`;
        }).join('');

        html += `<div class="kb-card" onclick="openKBReader('${esc(report.id)}')">`;
        html += `<div class="kb-card-header">`;
        html += `<div class="kb-card-icon ${typeInfo.class}">${typeInfo.icon}</div>`;
        html += `<span class="kb-card-type ${typeInfo.class}">${typeInfo.label}</span>`;
        html += `</div>`;
        html += `<div class="kb-card-title">${esc(report.title)}</div>`;
        html += `<div class="kb-card-desc">${esc(report.description)}</div>`;
        html += `<div class="kb-card-meta">`;
        html += topicIcons;
        if (report.date) html += `<span class="kb-card-date">${esc(report.date)}</span>`;
        html += `</div>`;
        if (report.author) {
          html += `<div class="kb-card-file">✍️ ${esc(report.author)}${report.publisher ? ' · ' + esc(report.publisher) : ''}</div>`;
        }
        if (report.fileName) {
          html += `<div class="kb-card-file">📎 ${esc(report.fileName)}${report.fileSize ? ' (' + esc(report.fileSize) + ')' : ''}</div>`;
        }
        html += `</div>`;
      });
      html += '</div>';
      cardsContainer.innerHTML = html;
    }

    function setKBSourceFilter(type) {
      kbSourceTypeFilter = type;
      renderKBPage();
    }
    function setKBTopicFilter(topic) {
      kbTopicFilter = topic;
      renderKBPage();
    }

    // ============================================================
    // KB Reader
    // ============================================================
    function openKBReader(reportId) {
      const report = kbReports.find(r => r.id === reportId);
      if (!report) return;

      const typeInfo = KB_SOURCE_TYPES[report.sourceType] || KB_SOURCE_TYPES.industry;

      // Fill header
      document.getElementById('kbReaderType').textContent = typeInfo.label;
      document.getElementById('kbReaderType').className = 'kb-reader-type ' + typeInfo.class;
      document.getElementById('kbReaderTitle').textContent = report.title;
      const metaParts = [];
      if (report.author) metaParts.push(report.author);
      if (report.publisher) metaParts.push(report.publisher);
      if (report.date) metaParts.push(report.date);
      document.getElementById('kbReaderMeta').textContent = metaParts.join(' · ');

      // Actions
      const actionsEl = document.getElementById('kbReaderActions');
      let actionsHtml = '';
      if (report.pdfFile) {
        actionsHtml += `<a href="${esc(report.pdfFile)}" class="btn-primary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;" target="_blank">📄 下载原文 PDF</a>`;
      }
      if (report.originalUrl) {
        actionsHtml += `<a href="${esc(report.originalUrl)}" class="btn-secondary" style="display:inline-flex;align-items:center;gap:6px;text-decoration:none;" target="_blank">🔗 阅读原文</a>`;
      }
      actionsEl.innerHTML = actionsHtml;

      // Topics
      const topicsEl = document.getElementById('kbReaderTopics');
      topicsEl.innerHTML = (report.topics || []).map(t => `<span class="kb-reader-topic-tag">${KB_TOPIC_TAGS[t] || '📌'} ${esc(t)}</span>`).join('');

      // Content (load summary)
      const contentEl = document.getElementById('kbReaderContent');
      contentEl.innerHTML = '<div class="kb-reader-loading">⏳ 加载摘要内容中...</div>';

      // Load summary markdown if available
      if (report.summaryFile) {
        fetch(report.summaryFile)
          .then(r => r.text())
          .then(md => { contentEl.innerHTML = mdToHtml(md); })
          .catch(() => {
            contentEl.innerHTML = `<p style="color:var(--text2);font-size:13px;">📋 ${esc(report.description || '暂无摘要内容')}</p>`;
          });
      } else {
        contentEl.innerHTML = `<p style="color:var(--text2);font-size:13px;">📋 ${esc(report.description || '暂无摘要内容')}</p>`;
      }

      // Open overlay
      document.getElementById('kbReaderOverlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeKBReader() {
      document.getElementById('kbReaderOverlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    function mdToHtml(md) {
      if (!md) return '';
      let html = md
        // Remove the title comment block at the top
        .replace(/^> \*\*原标题\*\*.*?\n> \*\*发布日期\*\*.*?\n\n---\n\n/, '')
        // H1
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // H2
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        // H3
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        // HR
        .replace(/^---$/gm, '<hr>')
        // Blockquote (single line)
        .replace(/^> (.+)$/gm, '<blockquote><p>$1</p></blockquote>')
        // Bold
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // Italic
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        // Inline code
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        // Unordered list items
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        // Ordered list items
        .replace(/^\d+\. (.+)$/gm, '<li>$1</li>')
        // Wrap consecutive <li> in <ul>
        .replace(/(<li>.*<\/li>\n?)+/g, match => '<ul>' + match + '</ul>')
        // Paragraphs: wrap non-tag lines
        .split('\n\n')
        .map(block => {
          block = block.trim();
          if (!block) return '';
          if (/^<(h[1-3]|ul|ol|blockquote|hr|div)/.test(block)) return block;
          if (block.startsWith('<ul>') || block.startsWith('<ol>')) return block;
          return `<p>${block}</p>`;
        })
        .join('\n');
      return html;
    }

    // ============================================================
    // KB URL Archive
    // ============================================================
    function handleKBArchive(event) {
      event.preventDefault();
      const url = document.getElementById('kbArchiveUrl').value.trim();
      if (!url) return;

      const btn = document.getElementById('kbArchiveBtn');
      const resultEl = document.getElementById('kbArchiveResult');
      btn.disabled = true;
      btn.textContent = '⏳ 处理中...';
      resultEl.innerHTML = '';

      // Since GitHub Pages is static, we show instructions for Javis to process
      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '📥 存档';
        resultEl.innerHTML = `
          <div class="kb-archive-result success">
            ✅ 链接已记录：<strong>${esc(url)}</strong><br>
            请将此链接发送给 Javis，我将自动抓取内容、解析归档，纳入知识库。
          </div>
        `;
        document.getElementById('kbArchiveUrl').value = '';
      }, 600);
    }

    // ============================================================
    // Init
    // ============================================================
    document.getElementById('searchBox').addEventListener('input', renderInfoList);
    loadData();
  </script>
</body>
</html>
