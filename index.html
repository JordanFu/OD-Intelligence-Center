<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OD 情报中心 · AI 组织设计研究</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #242837;
      --surface3: #2a2f40;
      --border: #2e3348;
      --text: #e1e4ed;
      --text2: #8b91a8;
      --accent: #6c8cff;
      --accent2: #a78bfa;
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --orange: #fbbf24;
      --red: #f87171;
      --trust-high: #fbbf24;
      --trust-mid: #60a5fa;
      --trust-ref: #a78bfa;
      --xhs-red: #ff2442;
      --xhs-red-dim: rgba(255, 36, 66, 0.12);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a1d27 0%, #242837 100%);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 24px;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p {
      font-size: 12px;
      color: var(--text2);
      margin-top: 2px;
    }
    .header-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text2);
    }
    .header-stats strong { color: var(--accent); font-weight: 600; }

    /* Tabs */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--surface);
      padding: 3px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text2);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .tab-btn.xhs-tab.active {
      background: var(--xhs-red);
    }
    .tab-btn.kb-tab.active {
      background: var(--orange);
      color: #000;
    }
    .tab-btn .badge {
      font-size: 11px;
      padding: 1px 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      font-weight: 600;
    }
    .tab-btn.active .badge {
      background: rgba(255,255,255,0.25);
    }

    /* Page visibility */
    .page { display: none; }
    .page.active { display: block; }

    /* =================== Information Page =================== */
    .controls {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 24px;
    }
    .search-box {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box:focus { border-color: var(--accent); }
    .search-wrap { position: relative; }
    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text2);
    }
    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 13px;
      color: var(--text2);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .filter-tag {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-tag:hover { border-color: var(--accent); color: var(--text); }
    .filter-tag.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-tag.trust-high.active { background: var(--trust-high); border-color: var(--trust-high); color: #000; }
    .filter-tag.trust-mid.active { background: var(--trust-mid); border-color: var(--trust-mid); color: #fff; }
    .filter-tag.trust-ref.active { background: var(--trust-ref); border-color: var(--trust-ref); color: #fff; }
    .filter-tag.source-tag.active { background: var(--green); border-color: var(--green); color: #000; }
    .stats {
      margin-top: 12px;
      font-size: 13px;
      color: var(--text2);
    }
    .stats strong { color: var(--accent); }

    .content {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }

    /* Day Group */
    .day-group { margin-top: 32px; }
    .day-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .day-header h2 { font-size: 17px; font-weight: 600; color: var(--text); }
    .day-count {
      font-size: 12px;
      background: var(--surface2);
      padding: 2px 10px;
      border-radius: 12px;
      color: var(--text2);
    }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 16px rgba(108, 140, 255, 0.08);
      transform: translateY(-1px);
    }
    .card.active {
      border-color: var(--green);
      box-shadow: 0 4px 24px rgba(52, 211, 153, 0.1);
    }
    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .card-title-area { flex: 1; min-width: 0; }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
    }
    .card-brief {
      font-size: 13px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .card-trust-mini {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 500;
      white-space: nowrap;
    }
    .trust-high { background: rgba(251, 191, 36, 0.15); color: var(--trust-high); }
    .trust-mid { background: rgba(96, 165, 250, 0.15); color: var(--trust-mid); }
    .trust-ref { background: rgba(167, 139, 250, 0.15); color: var(--trust-ref); }
    .card-expand-icon {
      width: 20px;
      height: 20px;
      color: var(--text2);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .card.active .card-expand-icon {
      transform: rotate(180deg);
      color: var(--green);
    }
    .card-meta-mini {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 6px;
      font-size: 12px;
      color: var(--text2);
    }

    /* Reader Panel */
    .reader-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease, margin 0.3s ease;
      margin-top: 0;
    }
    .reader-panel.open {
      max-height: 1200px;
      opacity: 1;
      margin-top: 4px;
    }
    .reader-inner { padding: 24px; }
    .reader-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .reader-num {
      font-size: 32px;
      font-weight: 800;
      color: var(--accent);
      opacity: 0.3;
      line-height: 1;
      flex-shrink: 0;
    }
    .reader-title { font-size: 18px; font-weight: 700; line-height: 1.5; }
    .reader-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
    }
    .reader-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text2);
    }
    .reader-meta-item strong { color: var(--text); font-weight: 500; }
    .reader-section { margin-bottom: 16px; }
    .reader-section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text2);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .reader-section-label .icon { width: 16px; height: 16px; }
    .reader-summary { font-size: 15px; line-height: 1.8; }
    .reader-insight {
      font-size: 15px;
      color: var(--green);
      background: var(--green-dim);
      padding: 16px 18px;
      border-radius: 10px;
      border-left: 4px solid var(--green);
      line-height: 1.8;
    }
    .reader-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 20px;
    }
    .reader-tag {
      font-size: 12px;
      padding: 4px 10px;
      background: var(--surface);
      border-radius: 6px;
      color: var(--text2);
      cursor: pointer;
      transition: all 0.2s;
    }
    .reader-tag:hover { background: var(--border); color: var(--text); }
    .reader-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }
    .btn-read-original {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      text-decoration: none;
    }
    .btn-read-original:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-close-panel {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-close-panel:hover { border-color: var(--text2); color: var(--text); }
    .btn-generate-xhs {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: var(--xhs-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .btn-generate-xhs:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Source coverage bar */
    .coverage {
      margin-top: 16px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .coverage-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; }
    .coverage-bar { display: flex; flex-wrap: wrap; gap: 6px; }
    .coverage-item {
      font-size: 11px;
      padding: 3px 8px;
      background: var(--surface2);
      border-radius: 12px;
      color: var(--text2);
    }
    .coverage-item.active {
      background: rgba(52, 211, 153, 0.15);
      color: var(--green);
    }
    .coverage-count { color: var(--text); font-weight: 600; }

    /* =================== Daily Report Page =================== */
    .report-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }
    .report-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .report-stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .report-stat-value {
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.2;
    }
    .report-stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }
    .trust-bar {
      display: flex;
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      background: var(--surface2);
      margin: 12px 0;
    }
    .trust-bar-seg { height: 100%; transition: width 0.4s ease; }
    .trust-bar-seg.high { background: var(--trust-high); }
    .trust-bar-seg.mid { background: var(--trust-mid); }
    .trust-bar-seg.ref { background: var(--trust-ref); }
    .trust-legend { display: flex; gap: 16px; font-size: 12px; color: var(--text2); }
    .trust-legend-item { display: flex; align-items: center; gap: 4px; }
    .trust-legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .report-timeline { position: relative; padding-left: 28px; }
    .report-timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }
    .report-day { position: relative; margin-bottom: 24px; }
    .report-day-dot {
      position: absolute;
      left: -24px;
      top: 16px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }
    .report-day-dot.today {
      background: var(--green);
      box-shadow: 0 0 8px rgba(52, 211, 153, 0.4);
    }
    .report-day-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .report-day-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 12px rgba(108, 140, 255, 0.08);
    }
    .report-day-card.expanded { border-color: var(--green); }
    .report-day-header {
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .report-day-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .report-day-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--green-dim);
      color: var(--green);
      font-weight: 500;
    }
    .report-day-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: var(--text2);
      flex-shrink: 0;
    }
    .report-day-meta strong { color: var(--text); font-weight: 500; }
    .report-day-expand {
      width: 20px;
      height: 20px;
      color: var(--text2);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .report-day-card.expanded .report-day-expand {
      transform: rotate(180deg);
      color: var(--green);
    }
    .report-day-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .report-day-card.expanded .report-day-body { max-height: 3000px; }
    .report-day-content {
      padding: 0 20px 20px;
      border-top: 1px solid var(--border);
    }
    .report-section { margin-top: 20px; }
    .report-section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .source-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .source-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--surface2);
      color: var(--text2);
      font-weight: 500;
      font-size: 12px;
    }
    .source-table th:first-child { border-radius: 6px 0 0 6px; }
    .source-table th:last-child { border-radius: 0 6px 6px 0; }
    .source-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .pick-item {
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 8px;
      border-left: 3px solid var(--green);
      transition: border-color 0.2s;
    }
    .pick-item:hover { border-left-color: var(--accent); }
    .pick-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; line-height: 1.4; }
    .pick-meta { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
    .pick-reason { font-size: 13px; color: var(--green); line-height: 1.5; }
    .pick-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--accent);
      text-decoration: none;
      margin-top: 4px;
    }
    .pick-link:hover { text-decoration: underline; }
    .trend-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .trend-item:last-child { border-bottom: none; }
    .trend-num { font-size: 14px; font-weight: 700; color: var(--accent); opacity: 0.5; flex-shrink: 0; width: 20px; }
    .trend-text { font-size: 14px; line-height: 1.6; }
    .focus-item { display: flex; gap: 10px; padding: 8px 0; }
    .focus-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--orange); flex-shrink: 0; margin-top: 8px; }
    .focus-text { font-size: 13px; color: var(--text2); line-height: 1.5; }
    .report-tags { display: flex; flex-wrap: wrap; gap: 6px; }
    .report-tag { font-size: 11px; padding: 3px 10px; background: var(--surface2); border-radius: 12px; color: var(--text2); }

    /* =================== XHS Content Workshop Page =================== */
    .xhs-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }

    /* XHS generate panel */
    .xhs-generate-panel {
      background: linear-gradient(135deg, rgba(255, 36, 66, 0.08), rgba(255, 36, 66, 0.03));
      border: 1px solid rgba(255, 36, 66, 0.2);
      border-radius: 14px;
      padding: 20px 24px;
      margin-bottom: 28px;
    }
    .xhs-generate-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .xhs-generate-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .xhs-generate-title .xhs-icon {
      width: 24px;
      height: 24px;
      background: var(--xhs-red);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
    }
    .xhs-generate-desc {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 16px;
      line-height: 1.6;
    }
    .xhs-gen-options {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .xhs-gen-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      background: var(--xhs-red);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .xhs-gen-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .xhs-gen-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .xhs-gen-btn-secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text2);
      font-weight: 500;
    }
    .xhs-gen-btn-secondary:hover {
      border-color: var(--xhs-red);
      color: var(--xhs-red);
      opacity: 1;
    }
    .xhs-date-select {
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      cursor: pointer;
    }
    .xhs-gen-stats {
      font-size: 12px;
      color: var(--text2);
      margin-left: auto;
    }
    .xhs-gen-stats strong { color: var(--xhs-red); }

    /* XHS Content Cards */

      display: flex;

      justify-content: space-between;
      margin-bottom: 16px;

      gap: 8px;

      color: var(--accent);
    }
    .xhs-note-type.type-practice {

      background: rgba(248, 113, 113, 0.12);
      color: var(--red);

      font-size: 12px;

      display: flex;
      gap: 12px;
      flex-shrink: 0;

    .xhs-note-body {
      padding: 20px;

    /* XHS text content area */
    .xhs-text-content {
      background: #fff;
      color: #333;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 16px;

      white-space: pre-wrap;
      word-break: break-word;

    .xhs-text-content .xhs-emoji-line {
      color: #999;
      font-size: 14px;
      margin-top: 8px;
    }
    .xhs-text-content .xhs-tag-line {
      color: var(--xhs-red);
      font-weight: 500;
    }
    .xhs-copy-hint {
      position: absolute;
      top: 8px;
      right: 8px;
      font-size: 11px;
      color: #999;
      background: #f5f5f5;
      padding: 2px 8px;
      border-radius: 4px;

    /* XHS source reference */
    .xhs-sources {
      padding: 12px 16px;
      background: var(--surface2);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .xhs-sources-title {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .xhs-source-item {
      font-size: 12px;
      color: var(--text2);
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .xhs-source-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text2);
      flex-shrink: 0;
    }
    .xhs-source-item a {
      color: var(--accent);
      text-decoration: none;
      font-size: 12px;
    }
    .xhs-source-item a:hover { text-decoration: underline; }

    /* XHS image suggestion */
    .xhs-image-suggestion {
      padding: 14px 16px;
      background: var(--surface2);
      border-radius: 10px;
      border-left: 3px solid var(--orange);
    }
    .xhs-image-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--orange);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .xhs-image-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;
    }

    /* XHS card actions */
    .xhs-note-actions {
      padding: 12px 20px;
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--border);
      background: var(--surface2);
    }
    .xhs-action-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .xhs-action-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .xhs-action-btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .xhs-action-btn.primary:hover {
      opacity: 0.9;
    }

    /* XHS compact mode */
    .xhs-note-card.compact .xhs-note-body { display: none; }

    .xhs-note-card.compact:hover {
      border-color: var(--xhs-red);

    /* XHS loading spinner */
    .xhs-loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .xhs-loading-spinner {

      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--xhs-red);

    .xhs-empty {

    .xhs-empty-icon {

    }

    /* =================== Knowledge Base Page =================== */
    .kb-page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 24px 60px;
    }
    .kb-upload-banner {
      background: linear-gradient(135deg, rgba(251, 191, 36, 0.08), rgba(251, 191, 36, 0.03));

      padding: 20px 24px;

    .kb-upload-header {

      align-items: center;
      gap: 10px;

    .kb-upload-title {

      align-items: center;

      color: #000;

    .kb-upload-desc {
      font-size: 13px;

    .kb-upload-steps {

    .kb-filters {

      margin-bottom: 20px;
      align-items: center;
    }
    .kb-filter-label {
      font-size: 13px;
      color: var(--text2);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .kb-filter-tag {
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;

    .kb-filter-tag:hover { border-color: var(--orange); color: var(--text); }

    .kb-search-box {

    .kb-grid {

    }
    .kb-card {
      background: var(--surface);

      cursor: default;
    }
    .kb-card:hover {
      border-color: var(--orange);

    .kb-card-header {

    .kb-card-icon.consulting { background: rgba(108, 140, 255, 0.15); }
    .kb-card-icon.academic { background: rgba(167, 139, 250, 0.15); }
    .kb-card-icon.industry { background: rgba(52, 211, 153, 0.15); }
    .kb-card-icon.internal { background: rgba(251, 191, 36, 0.15); }
    .kb-card-icon.media { background: rgba(248, 113, 113, 0.15); }
    .kb-card-type {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .kb-card-type.consulting { background: rgba(108, 140, 255, 0.12); color: var(--accent); }
    .kb-card-type.academic { background: rgba(167, 139, 250, 0.12); color: var(--accent2); }
    .kb-card-type.industry { background: rgba(52, 211, 153, 0.12); color: var(--green); }
    .kb-card-type.internal { background: rgba(251, 191, 36, 0.12); color: var(--orange); }
    .kb-card-type.media { background: rgba(248, 113, 113, 0.12); color: var(--red); }
    .kb-card-title {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.4;
      color: var(--text);
      margin-bottom: 6px;
    }
    .kb-card-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6;

      margin-bottom: 10px;

    .kb-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .kb-card-tag {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--surface2);
      border-radius: 10px;
      color: var(--text2);

    .kb-card-date {
      font-size: 11px;
      color: var(--text2);
      margin-left: auto;
    }
    .kb-card-file {
      font-size: 11px;
      color: var(--accent);
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .kb-empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .kb-empty-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 16px;
      background: rgba(251, 191, 36, 0.12);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }
    .kb-empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .kb-empty p { font-size: 14px; max-width: 400px; margin: 0 auto; }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--green);
      color: #000;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      z-index: 1000;
      transition: transform 0.3s ease;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text2);
    }
    .empty svg { margin-bottom: 16px; opacity: 0.4; }

    /* Footer */
    .footer {

      padding: 24px;
      color: var(--text2);
      font-size: 12px;

      margin: 40px auto 0;
    }

    mark {
      background: rgba(108, 140, 255, 0.3);
      color: var(--text);
      border-radius: 2px;
      padding: 0 2px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header h1 { font-size: 18px; }

      .card-title { font-size: 14px; }

<body>

  <header class="header">
    <div class="header-inner">
      <div class="header-top">

  <!-- =================== Info Page =================== -->

  <div class="footer">

  <div class="toast" id="toast"></div>

  <script>
    // ============================================================
    // State
    // ============================================================
    let allDays = [];
    let allReports = [];
    let xhsNotes = [];
    let kbReports = [];
    let currentTab = 'info';
    let activeTagFilter = null;
    let activeSourceFilter = null;
    let activeTrustFilter = null;
    let openCardId = null;
    let expandedReportDate = null;
    let xhsViewMode = 'full'; // 'full' | 'compact'
    let xhsExpandedCards = new Set();
    let isGenerating = false;
    let kbSourceTypeFilter = null;
    let kbTopicFilter = null;

    const PLATFORM_CATEGORIES = {
      '国内媒体': ['36氪', '机器之心', '钛媒体', '虎嗅', '界面新闻', '第一财经', '晚点LatePost', '新智元', '量子位', '新浪财经', '搜狐', '每日经济新闻'],
      '国际媒体': ['Hacker News', 'TechCrunch', 'The Verge', 'Wired', 'MIT Technology Review', 'Bloomberg', 'Reuters', 'WinBuzzer', 'siuleeboss'],
      '咨询公司': ['McKinsey', 'BCG', 'Bain', 'Mercer', 'Aon', 'Deloitte', '德勤', 'PwC', 'EY', 'Capgemini', 'WTW', 'Gartner'],
      '学术机构': ['HBR', 'HBS', 'Harvard', 'Stanford HAI', 'MIT CSAIL', 'MIT', 'arXiv', 'SSRN'],
      '行业研究': ['HRTech', 'InfoQ', '火山引擎', 'CCF'],
      '社交平台': ['小红书', '微信公众号', '知乎', '即刻', 'LinkedIn', 'Twitter/X', 'Reddit', '百度百家']
    };

    const TRUST_LEVELS = {
      '⭐高': { label: '⭐ 官方/学术/权威', class: 'trust-high', key: 'high' },
      '📰较高': { label: '📰 知名媒体', class: 'trust-mid', key: 'mid' },
      '💬参考': { label: '💬 社交/社区', class: 'trust-ref', key: 'ref' }
    };

    // ============================================================
    // Utility
    // ============================================================
    function esc(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function truncate(str, len) {
      if (!str) return '';
      return str.length > len ? str.substring(0, len) + '...' : str;
    }
    function highlightText(text, query) {
      if (!query || !text) return text;
      const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ============================================================
    // Tab Switching
    // ============================================================
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active',
          (i === 0 && tab === 'info') ||
          (i === 1 && tab === 'report') ||
          (i === 2 && tab === 'xhs') ||
          (i === 3 && tab === 'kb'));
      });
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(`page-${tab}`).classList.add('active');
      if (tab === 'xhs') renderXHSPage();
      if (tab === 'kb') renderKBPage();
    }

    // ============================================================
    // Parser
    // ============================================================
    function parseDigest(markdown) {
      const lines = markdown.split('\n');
      let currentDay = null;
      let currentItem = null;
      const days = [];
      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        if (line.includes('<!--')) continue;
        const dayMatch = line.match(/^## (\d{4}-\d{2}-\d{2})/);
        if (dayMatch) {
          if (currentDay && currentDay.items.length > 0) days.push(currentDay);
          currentDay = { date: dayMatch[1], items: [] };
          currentItem = null;
          continue;
        }
        if (!currentDay) continue;
        const titleMatch = line.match(/^### \[(\d+)\]\s+(.+)/);
        if (titleMatch) {
          currentItem = {
            id: titleMatch[1], title: titleMatch[2],
            summary: '', source: '', sourceUrl: '', platform: '',
            trust: '', insight: '', tags: [], time: ''
          };
          currentDay.items.push(currentItem);
          continue;
        }
        if (!currentItem) continue;
        const summaryMatch = line.match(/^- \*\*事件摘要\*\*[：:]\s*(.+)/);
        if (summaryMatch) { currentItem.summary = summaryMatch[1]; continue; }
        const sourceMatch = line.match(/^- \*\*来源\*\*[：:]\s*(.+)/);
        if (sourceMatch) {
          const raw = sourceMatch[1].trim();
          const mdLinkMatch = raw.match(/^\[([^\]]*)\]\(([^)]+)\)$/);
          if (mdLinkMatch) {
            currentItem.source = mdLinkMatch[1];
            currentItem.sourceUrl = mdLinkMatch[2];
          } else {
            const parenMatch = raw.match(/^(.+?)[（(](.+?)[）)]/);
            if (parenMatch) {
              currentItem.source = parenMatch[1].trim();
              currentItem.sourceUrl = parenMatch[2].trim();
            } else {
              currentItem.source = raw;
            }
          }
          continue;
        }
        const platformMatch = line.match(/^- \*\*来源平台\*\*[：:]\s*(.+)/);
        if (platformMatch) { currentItem.platform = platformMatch[1].trim(); continue; }
        const trustMatch = line.match(/^- \*\*来源可信度\*\*[：:]\s*(.+)/);
        if (trustMatch) { currentItem.trust = trustMatch[1].trim(); continue; }
        const insightMatch = line.match(/^- \*\*OD启示\*\*[：:]\s*(.+)/);
        if (insightMatch) { currentItem.insight = insightMatch[1]; continue; }
        const tagMatch = line.match(/^- \*\*标签\*\*[：:]\s*(.+)/);
        if (tagMatch) {
          currentItem.tags = tagMatch[1].match(/#[\w\u4e00-\u9fff-]+/g) || [];
          currentItem.tags = currentItem.tags.map(t => t.replace('#', ''));
          continue;
        }
        const timeMatch = line.match(/^- \*\*抓取时间\*\*[：:]\s*(.+)/);
        if (timeMatch) { currentItem.time = timeMatch[1]; continue; }
      }
      if (currentDay && currentDay.items.length > 0) days.push(currentDay);
      return days;
    }

    // ============================================================
    // Load
    // ============================================================
    async function loadData() {
      try {
        const resp = await fetch('./digest.md');
        if (resp.ok) {
          const text = await resp.text();
          allDays = parseDigest(text);
        }
      } catch (e) { console.log('digest.md not loaded'); }

      try {
        const resp = await fetch('./daily-report/digest.json');
        if (resp.ok) {
          const data = await resp.json();
          allReports = (data.reports || []).sort((a, b) => b.date.localeCompare(a.date));
        }
      } catch (e) { console.log('digest.json not loaded'); }

      // Try loading pre-generated XHS content
      try {
        const resp = await fetch('./xhs-content/digest.json');
        if (resp.ok) {
          const data = await resp.json();
          xhsNotes = data.notes || [];
        }
      } catch (e) { console.log('xhs digest not loaded'); }

      // Try loading knowledge base catalog
      try {
        const resp = await fetch('./knowledge/catalog.json');
        if (resp.ok) {
          const data = await resp.json();
          kbReports = data.reports || [];
        }
      } catch (e) { console.log('kb catalog not loaded'); }

      updateBadges();
      renderInfoPage();
      renderReportPage();
    }

    function updateBadges() {
      const totalItems = allDays.reduce((s, d) => s + d.items.length, 0);
      document.getElementById('infoBadge').textContent = totalItems;
      document.getElementById('reportBadge').textContent = allReports.length;
      document.getElementById('xhsBadge').textContent = xhsNotes.length;
      document.getElementById('kbBadge').textContent = kbReports.length;

      const totalDays = allDays.length;
      const totalSources = new Set();
      allDays.forEach(d => d.items.forEach(item => {
        totalSources.add(item.platform || item.source || '');
      }));
      document.getElementById('headerStats').innerHTML =
        `<span>📅 <strong>${totalDays}</strong> 天</span>` +
        `<span>📄 <strong>${totalItems}</strong> 条</span>` +
        `<span>📡 <strong>${totalSources.size}</strong> 源</span>`;
    }

    // ============================================================
    // Info Page Renderers
    // ============================================================
    function getAllTags() {
      const tagSet = new Set();
      allDays.forEach(d => d.items.forEach(item => item.tags.forEach(t => tagSet.add(t))));
      return Array.from(tagSet).sort();
    }
    function getAllPlatforms() {
      const srcMap = new Map();
      allDays.forEach(d => d.items.forEach(item => {
        const p = item.platform || item.source || '未知';
        srcMap.set(p, (srcMap.get(p) || 0) + 1);
      }));
      return Array.from(srcMap.entries()).sort((a, b) => b[1] - a[1]);
    }
    function getTrustStats() {
      const stats = { '⭐高': 0, '📰较高': 0, '💬参考': 0, '': 0 };
      allDays.forEach(d => d.items.forEach(item => {
        const t = item.trust || '';
        if (stats[t] !== undefined) stats[t]++;
        else stats['']++;
      }));
      return stats;
    }
    function renderTrustFilters() {
      const container = document.getElementById('trustFilters');
      const stats = getTrustStats();
      let html = '<span class="filter-label">可信度：</span>';
      html += `<span class="filter-tag ${!activeTrustFilter ? 'active' : ''}" onclick="setTrustFilter(null)">全部</span>`;
      for (const [key, info] of Object.entries(TRUST_LEVELS)) {
        const count = stats[key] || 0;
        if (count > 0) {
          html += `<span class="filter-tag ${info.class} ${activeTrustFilter === key ? 'active' : ''}" onclick="setTrustFilter('${key}')">${info.label} (${count})</span>`;
        }
      }
      container.innerHTML = html;
    }
    function renderSourceFilters() {
      const container = document.getElementById('sourceFilters');
      const platforms = getAllPlatforms();
      if (platforms.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="filter-label">来源：</span>';
      html += `<span class="filter-tag source-tag ${!activeSourceFilter ? 'active' : ''}" onclick="setSourceFilter(null)">全部</span>`;
      platforms.forEach(([name, count]) => {
        html += `<span class="filter-tag source-tag ${activeSourceFilter === name ? 'active' : ''}" onclick="setSourceFilter('${name.replace(/'/g, "\\'")}')">${esc(name)} (${count})</span>`;
      });
      container.innerHTML = html;
    }
    function renderTagFilters() {
      const container = document.getElementById('tagFilters');
      const tags = getAllTags();
      if (tags.length === 0) { container.innerHTML = ''; return; }
      let html = '<span class="filter-label">标签：</span>';
      html += `<span class="filter-tag ${!activeTagFilter ? 'active' : ''}" onclick="setTagFilter(null)">全部</span>`;
      tags.forEach(tag => {
        html += `<span class="filter-tag ${activeTagFilter === tag ? 'active' : ''}" onclick="setTagFilter('${tag}')">#${esc(tag)}</span>`;
      });
      container.innerHTML = html;
    }
    function renderCoverage() {
      const container = document.getElementById('coverage');
      const platforms = getAllPlatforms();
      if (platforms.length === 0) { container.innerHTML = ''; return; }
      let html = '<div class="coverage-title">📊 来源覆盖情况（' + platforms.length + ' 个平台）</div><div class="coverage-bar">';
      for (const [cat, expectedPlatforms] of Object.entries(PLATFORM_CATEGORIES)) {
        for (const ep of expectedPlatforms) {
          const found = platforms.find(([name]) => name.includes(ep));
          html += `<span class="coverage-item ${found ? 'active' : ''}">${ep}${found ? ` <span class="coverage-count">(${found[1]})</span>` : ''}</span>`;
        }
      }
      html += '</div>';
      container.innerHTML = html;
    }
    function setTrustFilter(trust) { activeTrustFilter = trust; renderInfoPage(); }
    function setSourceFilter(source) { activeSourceFilter = source; renderInfoPage(); }
    function setTagFilter(tag) { activeTagFilter = tag; renderInfoPage(); }
    function toggleCard(date, id) {
      const cardKey = `${date}-${id}`;
      openCardId = openCardId === cardKey ? null : cardKey;
      renderInfoList();
    }

    function renderInfoPage() {
      renderTrustFilters();
      renderSourceFilters();
      renderTagFilters();

          }

            const haystack = [item.title, item.summary, item.source, item.platform, item.insight, ...item.tags].join(' ').toLowerCase();
            return haystack.includes(query);
          }

        });

          html += `<div class="reader-panel ${isActive ? 'open' : ''}" id="panel-${cardKey}"><div class="reader-inner"><div class="reader-header"><div class="reader-num">${item.id}</div><div class="reader-title">${highlightText(esc(item.title), query)}</div></div><div class="reader-meta"><span class="reader-meta-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg><strong>${esc(item.source)}</strong></span>${item.platform ? `<span class="reader-meta-item">📍 ${esc(item.platform)}</span>` : ''}${item.trust ? `<span class="reader-meta-item">${esc(item.trust)}</span>` : ''}${item.time ? `<span class="reader-meta-item">🕐 ${esc(item.time)}</span>` : ''}</div>${item.summary ? `<div class="reader-section"><div class="reader-section-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>事件摘要</div><div class="reader-summary">${highlightText(esc(item.summary), query)}</div></div>` : ''}${item.insight ? `<div class="reader-section"><div class="reader-section-label"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/></svg>OD 启示</div><div class="reader-insight">${highlightText(esc(item.insight), query)}</div></div>` : ''}${item.tags.length > 0 ? `<div class="reader-tags">${item.tags.map(t => `<span class="reader-tag" onclick="event.stopPropagation(); setTagFilter('${t}')">#${esc(t)}</span>`).join('')}</div>` : ''}<div class="reader-actions">${item.sourceUrl ? `<a class="btn-read-original" href="${esc(item.sourceUrl)}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>阅读原文</a>` : ''}<button class="btn-generate-xhs" onclick="event.stopPropagation(); generateXHSFromItem('${day.date}', '${item.id}')">📕 生成小红书</button><button class="btn-close-panel" onclick="event.stopPropagation(); toggleCard('${day.date}', '${item.id}')">收起</button></div></div></div>`;

    // ============================================================
    // XHS Content Workshop
    // ============================================================

    // Note type templates — 生成有活人感的内容，拒绝震惊体和模板味

      },

        label: '趋势解读',
        class: 'type-trend',
        hooks: [
          '最近行业里有几个信号，不知道你们注意到了没',
          '这周密集看了好多资料，慢慢拼出了一个大图景',
          '感觉接下来的12个月，组织设计这个领域会变',
          '我一直在跟踪这个方向，最近的数据验证了一个判断',
          '不是什么预测，就是几个我觉得值得留意的信号'
        ],
        emojis: []
      },
      practice: {
        label: '实践指南',
        class: 'type-practice',
        hooks: [
          '之前在项目里踩过不少坑，总结了一些还算管用的经验',
          '很多人问AI组织设计到底怎么落地，说说我的看法',
          '不是什么高深方法论，就是一些实际操作中的体会',
          '分享一个我们试过的思路，不一定对但可以参考',
          '与其焦虑AI要怎么搞，不如先从这几个小切口开始'
        ],
        emojis: []
      },
      debate: {
        label: '观点碰撞',
        class: 'type-debate',
        hooks: [
          '看到一个数据，跟主流叙事不太一样，记录一下',
          'AI替代人这个话题，吵了好一阵了，我想换个角度说',
          '说说一个可能不太受欢迎的观点',
          '最近几组数据放在一起看，有点意思',
          '这事儿两边都有道理，但我觉得关键点被忽略了'
        ],
        emojis: []
      }
    };

    function renderXHSPage() {
      const container = document.getElementById('xhsContent');
      const dates = allDays.map(d => d.date).sort().reverse();

      let html = '';

      // Generate panel
      html += `<div class="xhs-generate-panel">`;
      html += `<div class="xhs-generate-header">`;
      html += `<div class="xhs-generate-title"><span class="xhs-icon">📕</span> 内容工坊</div>`;
      html += `<div class="xhs-gen-stats">已生成 <strong>${xhsNotes.length}</strong> 篇</div>`;
      html += `</div>`;
      html += `<div class="xhs-generate-desc">基于情报库中的高价值信息，自动生成适合小红书发布的内容。每篇包含：标题、正文、话题标签、配图建议。可直接复制到小红书发布。</div>`;
      html += `<div class="xhs-gen-options">`;
      if (dates.length > 0) {
        html += `<select class="xhs-date-select" id="xhsDateSelect">`;
        html += `<option value="latest">最新一天 (${dates[0]})</option>`;
        html += `<option value="all">全部数据 (${allDays.reduce((s, d) => s + d.items.length, 0)} 条)</option>`;
        dates.slice(0, 7).forEach(d => {
          const count = allDays.find(dd => dd.date === d)?.items.length || 0;
          html += `<option value="${d}">${d} (${count} 条)</option>`;
        });
        html += `</select>`;
      }
      html += `<button class="xhs-gen-btn" onclick="generateXHSContent()" ${isGenerating ? 'disabled' : ''}>`;
      html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>`;
      html += `${isGenerating ? '生成中...' : '生成小红书内容'}`;
      html += `</button>`;
      html += `<button class="xhs-gen-btn xhs-gen-btn-secondary" onclick="clearXHSContent()">清空</button>`;
      html += `</div></div>`;

      // View toggle and cards
      if (xhsNotes.length > 0) {
        html += `<div class="xhs-cards-header">`;
        html += `<div class="xhs-cards-title">📚 生成的内容 (${xhsNotes.length} 篇)</div>`;
        html += `<div class="xhs-view-toggle">`;
        html += `<button class="xhs-view-btn ${xhsViewMode === 'full' ? 'active' : ''}" onclick="setXHSView('full')">展开</button>`;
        html += `<button class="xhs-view-btn ${xhsViewMode === 'compact' ? 'active' : ''}" onclick="setXHSView('compact')">折叠</button>`;
        html += `</div></div>`;

        xhsNotes.forEach((note, idx) => {
          const isExpanded = xhsViewMode === 'full' || xhsExpandedCards.has(idx);
          html += renderXHSCard(note, idx, isExpanded);
        });
      } else {
        html += `<div class="xhs-empty">`;
        html += `<div class="xhs-empty-icon">📕</div>`;
        html += `<h3>还没有生成内容</h3>`;
        html += `<p>点击上方"生成小红书内容"按钮，基于情报库数据自动生成 3-5 篇适合小红书发布的内容笔记。</p>`;
        html += `</div>`;
      }

      container.innerHTML = html;
    }

    function renderXHSCard(note, idx, isExpanded) {
      const template = XHS_TEMPLATES[note.type] || XHS_TEMPLATES.insight;
      let html = `<div class="xhs-note-card ${isExpanded ? '' : 'compact'}" ${!isExpanded ? `onclick="toggleXHSCard(${idx})"` : ''}>`;

      // Header
      html += `<div class="xhs-note-header">`;
      html += `<div class="xhs-note-num">${idx + 1}</div>`;
      html += `<div class="xhs-note-info">`;
      html += `<div class="xhs-note-title-text">${esc(note.title)}</div>`;
      html += `<span class="xhs-note-type ${template.class}">${template.label}</span>`;
      html += `</div>`;
      html += `<div class="xhs-note-meta">`;
      html += `<span>${note.charCount} 字</span>`;
      if (note.sourceCount) html += `<span>${note.sourceCount} 个来源</span>`;
      html += `</div>`;
      if (!isExpanded) {
        html += `<svg class="report-day-expand" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>`;
      }
      html += `</div>`;

      if (isExpanded) {
        // Body
        html += `<div class="xhs-note-body">`;

        // Text content (white card mimicking XHS post)
        html += `<div class="xhs-text-content" id="xhs-text-${idx}">${esc(note.content)}</div>`;

        // Sources
        if (note.sources && note.sources.length > 0) {
          html += `<div class="xhs-sources"><div class="xhs-sources-title">📎 信息来源</div>`;
          note.sources.forEach(src => {
            html += `<div class="xhs-source-item">`;
            html += `<span class="xhs-source-dot"></span>`;
            html += `<span>${esc(src.title)}</span>`;
            if (src.url) html += ` · <a href="${esc(src.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">原文</a>`;
            html += `</div>`;
          });
          html += `</div>`;
        }

        // Image suggestion
        if (note.imageSuggestion) {
          html += `<div class="xhs-image-suggestion">`;
          html += `<div class="xhs-image-label">🎨 配图建议</div>`;
          html += `<div class="xhs-image-desc">${esc(note.imageSuggestion)}</div>`;
          html += `</div>`;
        }

        html += `</div>`;

        // Actions
        html += `<div class="xhs-note-actions">`;
        html += `<button class="xhs-action-btn primary" onclick="copyXHSText(${idx})">`;
        html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
        html += `复制正文`;
        html += `</button>`;
        html += `<button class="xhs-action-btn" onclick="copyXHSFull(${idx})">`;
        html += `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;
        html += `复制全部`;
        html += `</button>`;
        html += `<button class="xhs-action-btn" onclick="regenerateXHSSingle(${idx})">🔄 重新生成</button>`;
        html += `</div>`;
      }

      html += `</div>`;
      return html;
    }

    function setXHSView(mode) {
      xhsViewMode = mode;
      if (mode === 'full') xhsExpandedCards.clear();
      renderXHSPage();
    }

    function toggleXHSCard(idx) {
      if (xhsExpandedCards.has(idx)) {
        xhsExpandedCards.delete(idx);
      } else {
        xhsExpandedCards.add(idx);
      }
      renderXHSPage();
    }

    function copyXHSText(idx) {
      const note = xhsNotes[idx];
      if (note) {
        navigator.clipboard.writeText(note.content).then(() => showToast('正文已复制到剪贴板'));
      }
    }

    function copyXHSFull(idx) {
      const note = xhsNotes[idx];
      if (!note) return;
      let fullText = note.content + '\n\n';
      if (note.sources && note.sources.length > 0) {
        fullText += '📎 参考来源：\n';
        note.sources.forEach(src => {
          fullText += `· ${src.title}`;
          if (src.url) fullText += ` ${src.url}`;
          fullText += '\n';
        });
      }
      if (note.imageSuggestion) {
        fullText += '\n🎨 配图建议：' + note.imageSuggestion;
      }
      navigator.clipboard.writeText(fullText).then(() => showToast('全部内容已复制到剪贴板'));
    }

    function clearXHSContent() {
      xhsNotes = [];
      updateBadges();
      renderXHSPage();
      showToast('已清空');
    }

    function regenerateXHSSingle(idx) {
      if (idx >= xhsNotes.length) return;
      const note = xhsNotes[idx];
      // Re-generate with same sources but different hook/template
      const types = Object.keys(XHS_TEMPLATES);
      const newType = types[Math.floor(Math.random() * types.length)];
      const newNote = generateSingleNote(note.sourceItems || [], newType);
      if (newNote) {
        xhsNotes[idx] = newNote;
        renderXHSPage();
        showToast('已重新生成');
      }
    }

    // ============================================================
    // XHS Content Generation Engine
    // ============================================================

    // Generate XHS note from a single info item (triggered from info library)
    function generateXHSFromItem(date, id) {
      // Find the item
      const day = allDays.find(d => d.date === date);
      if (!day) { showToast('未找到该信息'); return; }
      const item = day.items.find(i => i.id === id);
      if (!item) { showToast('未找到该信息'); return; }

      if (!item.insight && !item.summary) {
        showToast('该信息内容不足，无法生成小红书内容');
        return;
      }

      // Pick 1-2 related items from same day as context (optional enrichment)
      const sourceItems = [{ ...item, date: day.date }];
      const sameDayOthers = day.items.filter(i => i.id !== id && (i.insight || i.summary));
      if (sameDayOthers.length > 0) {
        // Pick at most 1 related item
        const related = sameDayOthers.find(i => {
          const myTags = new Set(item.tags || []);
          const theirTags = new Set(i.tags || []);
          return [...myTags].some(t => theirTags.has(t));
        });
        if (related) sourceItems.push({ ...related, date: day.date });
      }

      // Determine best type based on item content
      const types = Object.keys(XHS_TEMPLATES);
      let bestType = 'insight'; // default
      if (item.tags && (item.tags.some(t => t.includes('趋势') || t.includes('预测') || t.includes('未来')))) {
        bestType = 'trend';
      } else if (item.tags && (item.tags.some(t => t.includes('方法') || t.includes('实践') || t.includes('落地') || t.includes('策略')))) {
        bestType = 'practice';
      } else if (item.tags && (item.tags.some(t => t.includes('争议') || t.includes('挑战') || t.includes('风险') || t.includes('裁员')))) {
        bestType = 'debate';
      }

      // Generate the note
      const note = generateSingleNote(sourceItems, bestType);
      if (!note) { showToast('生成失败，请重试'); return; }

      // Add to existing notes (prepend so it appears at top)
      xhsNotes.unshift(note);
      updateBadges();

      // Switch to XHS tab and expand the new note
      xhsViewMode = 'full';
      xhsExpandedCards.clear();
      xhsExpandedCards.add(0);
      switchTab('xhs');

      showToast(`已基于「${truncate(item.title, 15)}」生成小红书内容`);
    }

    function generateXHSContent() {
      if (allDays.length === 0 || isGenerating) return;

      isGenerating = true;
      renderXHSPage();

      // Use setTimeout to let UI update
      setTimeout(() => {
        const dateSelect = document.getElementById('xhsDateSelect');
        const selectedDate = dateSelect ? dateSelect.value : 'latest';

        let sourceItems = [];

        if (selectedDate === 'all') {
          allDays.forEach(day => {
            day.items.forEach(item => {
              if (item.insight || item.summary) {
                sourceItems.push({ ...item, date: day.date });
              }
            });
          });
        } else {
          const targetDate = selectedDate === 'latest'
            ? allDays.map(d => d.date).sort().reverse()[0]
            : selectedDate;
          const day = allDays.find(d => d.date === targetDate);
          if (day) {
            day.items.forEach(item => {
              if (item.insight || item.summary) {
                sourceItems.push({ ...item, date: day.date });
              }
            });
          }
        }

        // Filter for high-quality items (those with insights)
        const qualityItems = sourceItems.filter(item => item.insight && item.insight.length > 20);

        if (qualityItems.length === 0) {
          isGenerating = false;
          renderXHSPage();
          showToast('没有足够的高质量数据来生成内容');
          return;
        }

        // Generate 3-5 notes
        const count = Math.min(Math.max(3, Math.floor(qualityItems.length / 2)), 5);
        const newNotes = [];

        // Strategy: pick different types
        const typePool = ['insight', 'trend', 'practice', 'debate'];
        const usedIndices = new Set();

        for (let i = 0; i < count && i < qualityItems.length; i++) {
          const type = typePool[i % typePool.length];

          // Pick 1-3 source items for this note
          let noteItems;
          if (type === 'trend' || type === 'debate') {
            // For trends/debates, pick 2-3 related items
            noteItems = pickRelatedItems(qualityItems, usedIndices, 2 + Math.floor(Math.random() * 2));
          } else {
            // For insights/practices, pick 1-2 focused items
            noteItems = pickRelatedItems(qualityItems, usedIndices, 1 + Math.floor(Math.random() * 2));
          }

          if (noteItems.length === 0) continue;

          noteItems.forEach(item => usedIndices.add(qualityItems.indexOf(item)));
          const note = generateSingleNote(noteItems, type);
          if (note) newNotes.push(note);
        }

        xhsNotes = newNotes;
        updateBadges();
        isGenerating = false;
        renderXHSPage();

        if (newNotes.length > 0) {
          showToast(`成功生成 ${newNotes.length} 篇小红书内容`);
        }
      }, 300);
    }

    function pickRelatedItems(items, usedIndices, count) {
      // Try to find related items (same tags)
      const available = items.filter((_, i) => !usedIndices.has(i));
      if (available.length === 0) return [];

      const picked = [];
      const first = available[Math.floor(Math.random() * available.length)];
      picked.push(first);
      usedIndices.add(items.indexOf(first));

      if (count > 1 && available.length > 1) {
        const firstTags = new Set(first.tags || []);
        // Try to find items with overlapping tags
        const related = available.filter(item => {
          if (item === first) return false;
          const itemTags = new Set(item.tags || []);
          return [...firstTags].some(t => itemTags.has(t));
        });

        if (related.length > 0) {
          // Shuffle and pick
          const shuffled = related.sort(() => Math.random() - 0.5);
          for (let i = 0; i < Math.min(count - 1, shuffled.length); i++) {
            picked.push(shuffled[i]);
            usedIndices.add(items.indexOf(shuffled[i]));
          }
        } else if (available.length > 1) {
          // Pick random unrelated items
          const others = available.filter(item => item !== first).sort(() => Math.random() - 0.5);
          for (let i = 0; i < Math.min(count - 1, others.length); i++) {
            picked.push(others[i]);
            usedIndices.add(items.indexOf(others[i]));
          }
        }
      }

      return picked;
    }

    function generateSingleNote(sourceItems, type) {
      if (!sourceItems || sourceItems.length === 0) return null;

      const template = XHS_TEMPLATES[type] || XHS_TEMPLATES.insight;
      const primaryItem = sourceItems[0];
      const secondaryItem = sourceItems[1];

      // Pick a random hook
      const hook = template.hooks[Math.floor(Math.random() * template.hooks.length)];

      // Build title based on primary item
      let title = generateTitle(primaryItem, type, hook);

      // Build content
      let content = generateContent(sourceItems, type, hook);

      // Build tags
      const allTags = [...new Set(sourceItems.flatMap(item => item.tags || []))];
      const xhsTags = generateXHSTags(allTags, type);

      // Full content with tags
      const fullContent = content + '\n\n' + xhsTags;

      // Image suggestion
      const imageSuggestion = generateImageSuggestion(sourceItems, type);

      // Sources
      const sources = sourceItems.map(item => ({
        title: item.title,
        url: item.sourceUrl || '',
        platform: item.platform || item.source || ''
      }));

      // Count
      const charCount = fullContent.length;

      return {
        type,
        title,
        content: fullContent,
        charCount,
        sourceCount: sources.length,
        sources,
        imageSuggestion,
        sourceItems: sourceItems.map(item => ({
          title: item.title,
          summary: item.summary,
          insight: item.insight,
          source: item.source,
          sourceUrl: item.sourceUrl,
          platform: item.platform,
          tags: item.tags,
          trust: item.trust,
          date: item.date
        }))
      };
    }

    function generateTitle(item, type, hook) {
      let title = '';
      const insight = item.insight || item.summary || '';

      if (type === 'insight') {
        // 优先用具体数字或事实作为标题
        const num = insight.match(/\d+[%％\d,万]+/g);
        if (num && num.length > 0) {
          const numStr = num.slice(0, 2).join('、');
          title = numStr + '背后的组织逻辑';
        } else {
          // 用报告中一个具体名词
          const concrete = insight.match(/[\u4e00-\u9fff]{2,8}(?:模型|框架|报告|调研|数据|实验|项目)/g);
          if (concrete && concrete.length > 0) {
            title = '拆解' + concrete[0] + '：看完有点想法';
          } else {
            title = item.title.replace(/[《》「」]/g, '').substring(0, 25);
          }
        }
      } else if (type === 'trend') {
        title = item.tags ? item.tags.slice(0, 2).join('、') + '：最近在发生什么' : '组织设计最近在发生什么';
      } else if (type === 'practice') {
        const practice = insight.match(/(?:建议|可以|需要|应该)[^\n。]{4,20}/g);
        if (practice && practice.length > 0) {
          title = practice[0].replace(/^[，、]/, '').substring(0, 22);
        } else {
          title = '说点实际的：' + item.title.replace(/[《》]/g, '').substring(0, 15);
        }
      } else if (type === 'debate') {
        const debates = [
          '说个可能跟主流不太一样的看法',
          'AI替代人？换个角度想想',
          '效率神话背后有个被忽略的问题',
          '为什么我觉得"全面AI化"值得再想想',
          '裁员数据看多了，想说几句实话'
        ];
        title = debates[Math.floor(Math.random() * debates.length)];
      }

      return title.substring(0, 28);
    }

    function generateContent(sourceItems, type, hook) {
      const primary = sourceItems[0];
      const secondary = sourceItems[1];

      let content = '';

      // 开头就是人话
      content += hook + '\n\n';

      if (type === 'insight') {
        // 把核心发现自然地展开，不用小标题
        content += formatInsightNatural(primary);
        if (secondary) {
          content += '\n\n另外还有个佐证：' + extractTrendPoint(secondary) + '。';
        }
        content += '\n\n' + generateNaturalAdvice(sourceItems);
      } else if (type === 'trend') {
        content += extractTrendPoint(primary) + '。\n\n';
        if (secondary) {
          content += '同时，' + extractTrendPoint(secondary) + '。\n\n';
        }
        content += generateNaturalImplication(sourceItems);
      } else if (type === 'practice') {
        const source = primary.source || '最新报告';
        content += `${source}刚出了新内容，我把跟OD实操相关的部分筛了出来：\n\n`;
        content += generateNaturalSteps(sourceItems);
      } else if (type === 'debate') {
        content += extractDebatePoint(primary) + '\n\n';
        if (secondary) {
          content += '不过换个角度看：' + extractDebatePoint(secondary) + '\n\n';
        }
        content += generateNaturalDebateOpinion(sourceItems);
      }

      // 结尾也要像人说的话，不要万能句式
      const closings = [
        '有不同看法可以在评论区聊，不一定对，但值得想想。',
        '就聊这些，有兴趣的可以去翻原文，链接在最后。',
        '也不知道想得对不对，记录一下，过段时间回头看。',
        '这个话题挺值得展开聊的，下次专门写一篇。',
        '先记到这里，后面有新数据再补充。'
      ];
      content += '\n\n---\n' + closings[Math.floor(Math.random() * closings.length)];

      return content;
    }

    // 把 insight 改写得更像人在说话
    function formatInsightNatural(item) {
      const insight = item.insight || item.summary || '';
      if (!insight) return '';
      // 取前2-3个有意义的句子，自然连接
      const sentences = insight.split(/[。；]/).filter(s => s.trim().length > 8);
      if (sentences.length === 0) return insight.substring(0, 200);
      const pick = sentences.slice(0, 3).map(s => s.trim().replace(/^[，、\s]+/, '')).join('。');
      return pick + '。';
    }

    // 生成像人说出来的建议，不要"给OD从业者的建议"这种标题
    function generateNaturalAdvice(items) {
      const advices = [];
      items.forEach(item => {
        if (item.insight) {
          const sentences = item.insight.split(/[。；]/).filter(s => s.trim().length > 10);
          if (sentences.length > 0) {
            // 取最后一句，通常是最有行动指导意义的
            advices.push(sentences[sentences.length - 1].trim().replace(/^[，、\s]+/, ''));
          }
        }
      });
      if (advices.length === 0) {
        // 没有提取到的话，用兜底的真人语气
        const fallbacks = [
          '与其焦虑AI要怎么用，不如先想清楚团队现在最缺什么能力。',
          '技术上能做的和业务上该做的，中间差着一个组织问题。',
          '转型不是一步到位的事，先找到一个小切口比什么都重要。'
        ];
        return fallbacks[Math.floor(Math.random() * fallbacks.length)];
      }
      const advice = advices.slice(0, 2).join('。') + '。';
      const prefixes = [
          '说到底，',
          '落到具体动作上，',
          '我觉得值得想的是，',
          '换个说法，'
        ];
      return prefixes[Math.floor(Math.random() * prefixes.length)] + advice;
    }

    function generateNaturalImplication(items) {
      const tags = [...new Set(items.flatMap(i => i.tags || []))];
      const topic = tags[0] || '组织变革';
      const implications = [
          `这几个信号连起来看，${topic}这块接下来大概率会有动作。建议关注，别等落地了才反应过来。`,
          `${topic}其实一直是"说了很久但没怎么动"的领域。但最近这波数据有点不一样，感觉真的在加速了。`,
          `说实话，之前对${topic}一直持观望态度。但这几份数据让我开始重新想了。`,
          `对做组织的人来说，${topic}可能是接下来一年最值得投入精力跟踪的方向。`
        ];
      return implications[Math.floor(Math.random() * implications.length)];
    }

    function generateNaturalSteps(items) {
      const steps = [];
      items.forEach(item => {
        if (item.insight) {
          const sentences = item.insight.split(/[。；]/)
            .filter(s => s.trim().length > 10 && (s.includes('建议') || s.includes('需要') || s.includes('应该') || s.includes('可以') || s.includes('能')))
            .map(s => s.trim().replace(/^[，、\s]+/, ''));
          steps.push(...sentences);
        }
      });
      if (steps.length === 0) {
        const fallbacks = [
          '先评估一下团队现在对AI的真实使用程度，别凭感觉。',
          '找一两个可以快速试点的场景，跑个MVP比写PPT有用。',
          '跟业务那边对齐一下期望值，AI不是万能药，得说清楚能做什么不能做什么。'
        ];
        return fallbacks[Math.floor(Math.random() * fallbacks.length)];
      }
      const pick = steps.slice(0, 3);
      return pick.map((s, i) => {
        const nums = ['第一，', '其次，', '最后，'];
        return (nums[i] || '') + s;
      }).join('\n');
    }

    function generateNaturalDebateOpinion(items) {
      const opinions = [
          '我觉得这事儿的关键不是AI行不行，而是你的组织有没有准备好接住它。技术问题好解决，人的问题难。与其争论AI能不能替代人，不如先看看自己的团队结构和工作方式有没有优化的空间。',
          '有个很反直觉的现象：越是喊着全面AI化的公司，越可能在基本面（流程、协作、技能）上没想清楚。AI是个放大器，好的组织设计会让它事半功倍，差的组织设计只会放大问题。',
          '说实话，我现在的判断是：短期看替代是夸大了，但长期看变革是被低估了。真正该担心的是中间这段时间——技能转型跟不上、组织架构还没调好、新的协作方式还没跑通。'
        ];
      return opinions[Math.floor(Math.random() * opinions.length)];
    }

    function extractKeywords(text) {
      if (!text) return [];
      const keywords = [];
      const patterns = [
        /[\u4e00-\u9fff]{2,6}(?:框架|模型|模式|机制|体系|策略|方法)/g,
        /[\u4e00-\u9fff]{2,4}(?:转型|变革|重塑|重构|升级|替代)/g,
        /\d+[%％]/g,
        /[\u4e00-\u9fff]{2,6}(?:核心|关键|重要|首要|主要)/g
      ];
      patterns.forEach(p => {
        const matches = text.match(p);
        if (matches) keywords.push(...matches.slice(0, 2));
      });
      return [...new Set(keywords)].slice(0, 4);
    }

    function extractTrendPoint(item) {
      const summary = item.summary || item.insight || '';
      // Extract first meaningful sentence
      const match = summary.match(/[^。？！]+[。？！]/);
      return match ? match[0].trim().substring(0, 80) : summary.substring(0, 80);
    }

    function extractDebatePoint(item) {
      const summary = item.summary || item.insight || '';
      const nums = summary.match(/\d+[%％\d,万]+/g);
      if (nums && nums.length > 0) {
        // Find sentence containing numbers
        const match = summary.match(/[^。？！]*\d+[^。？！]*[。？！]/);
        return match ? match[0].trim() : summary.substring(0, 100);
      }
      return summary.substring(0, 100);
    }

    function generateXHSTags(allTags, type) {
      // 基础标签——简洁、有人关注度的
      const baseTags = ['#AI', '#组织设计', '#职场'];

      // 来源中的标签，取前几个
      const sourceTags = allTags.slice(0, 3).map(t => '#' + t);

      // 根据类型加标签，但不说教
      const typeTags = {
        insight: ['#OD', '#组织发展'],
        trend: ['#行业观察', '#趋势'],
        practice: ['#工作方法', '#经验'],
        debate: ['#讨论', '#不同观点']
      };

      const tags = [...baseTags, ...sourceTags, ...(typeTags[type] || [])];
      return [...new Set(tags)].slice(0, 8).join(' ');
    }

    function generateImageSuggestion(sourceItems, type) {
      const tags = sourceItems.flatMap(i => i.tags || []);
      const primary = sourceItems[0];

      const suggestions = {
        insight: `信息图风格：提炼${primary.source || '报告'}中的1-2个核心数据，制作成简洁的数据可视化卡片。配色建议深蓝+白色，突出数字。可加"核心洞察"小标题。`,
        trend: `趋势时间线图：将关键趋势按照时间/重要性排列，使用箭头连接，体现"变化方向感"。可配合简洁的图标。背景可用渐变色增加视觉冲击力。`,
        practice: `清单/步骤卡片：将实践要点整理为带勾选框的清单形式，3-5个要点，每个配一个小图标。整体风格简洁专业，适合职场人群。`,
        debate: `对比式排版：左右分栏，一侧放"常见认知"，另一侧放"数据真相"，中间用VS分隔。数字用醒目颜色标注，制造视觉冲突感。`
      };

      return suggestions[type] || suggestions.insight;
    }

    // ============================================================
    // Knowledge Base
    // ============================================================

    const KB_SOURCE_TYPES = {
      consulting: { label: '咨询公司', icon: '🏢', class: 'consulting' },
      academic: { label: '学术机构', icon: '🎓', class: 'academic' },
      industry: { label: '行业研究', icon: '📊', class: 'industry' },
      internal: { label: '内部文档', icon: '📁', class: 'internal' },
      media: { label: '媒体深度', icon: '📰', class: 'media' }
    };

    const KB_TOPIC_TAGS = {
      'AI组织设计': '🤖',
      '人才发展': '👥',
      '绩效管理': '📈',
      '变革管理': '🔄',
      '组织文化': '🏛️',
      '战略规划': '🎯',
      '数字化转型': '💻',
      '领导力': '👑'
    };

    function renderKBPage() {
      const container = document.getElementById('kbContent');
      const sourceTypes = Object.entries(KB_SOURCE_TYPES);
      const topicTags = Object.entries(KB_TOPIC_TAGS);

      // Count stats
      const sourceCounts = {};
      kbReports.forEach(r => {
        sourceCounts[r.sourceType] = (sourceCounts[r.sourceType] || 0) + 1;
      });
      const topicCounts = {};
      kbReports.forEach(r => {
        (r.topics || []).forEach(t => {
          topicCounts[t] = (topicCounts[t] || 0) + 1;
        });
      });

      let html = '';

      // Upload banner
      html += `<div class="kb-upload-banner">`;
      html += `<div class="kb-upload-header">`;
      html += `<div class="kb-upload-icon">📤</div>`;
      html += `<div class="kb-upload-title">上传知识报告</div>`;
      html += `</div>`;
      html += `<div class="kb-upload-desc">`;
      html += `将研究报告、咨询文档、学术论文等文件发给 Javis（在对话框中直接发送文件或路径），即可自动完成：`;
      html += `</div>`;
      html += `<div class="kb-upload-steps">`;
      html += `<span class="kb-upload-step"><strong>1.</strong> 解析文件内容</span>`;
      html += `<span class="kb-upload-step"><strong>2.</strong> 自动分类（来源类型 + 研究主题）</span>`;
      html += `<span class="kb-upload-step"><strong>3.</strong> 生成摘要并纳入知识库</span>`;
      html += `<span class="kb-upload-step"><strong>4.</strong> 融入情报检索系统</span>`;
      html += `</div>`;
      html += `</div>`;

      // Filters
      html += `<div class="kb-filters">`;
      html += `<span class="kb-filter-label">来源：</span>`;
      html += `<span class="kb-filter-tag ${!kbSourceTypeFilter ? 'active' : ''}" onclick="setKBSourceFilter(null)">全部 (${kbReports.length})</span>`;
      sourceTypes.forEach(([key, info]) => {
        const count = sourceCounts[key] || 0;
        if (count > 0) {
          html += `<span class="kb-filter-tag ${kbSourceTypeFilter === key ? 'active' : ''}" onclick="setKBSourceFilter('${key}')">${info.icon} ${info.label} (${count})</span>`;
        }
      });
      html += `</div>`;
      html += `<div class="kb-filters">`;
      html += `<span class="kb-filter-label">主题：</span>`;
      html += `<span class="kb-filter-tag ${!kbTopicFilter ? 'active' : ''}" onclick="setKBTopicFilter(null)">全部</span>`;
      topicTags.forEach(([tag, icon]) => {
        const count = topicCounts[tag] || 0;
        if (count > 0) {
          html += `<span class="kb-filter-tag ${kbTopicFilter === tag ? 'active' : ''}" onclick="setKBTopicFilter('${tag}')">${icon} ${tag} (${count})</span>`;
        }
      });
      html += `</div>`;

      // Search
      html += `<div class="search-wrap" style="margin-bottom: 16px;">`;
      html += `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text2);"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`;
      html += `<input type="text" class="kb-search-box" id="kbSearchBox" placeholder="搜索报告标题、描述、主题..." oninput="renderKBCards()" />`;
      html += `</div>`;

      // Stats
      const filteredCount = getFilteredKBReports().length;
      html += `<div class="kb-stats">共 <strong>${kbReports.length}</strong> 份报告${filteredCount !== kbReports.length ? ` · 当前显示 <strong>${filteredCount}</strong> 份` : ''}</div>`;

      // Cards
      html += `<div id="kbCards"></div>`;
      container.innerHTML = html;
      renderKBCards();
    }

    function getFilteredKBReports() {
      const query = document.getElementById('kbSearchBox') ? document.getElementById('kbSearchBox').value.toLowerCase().trim() : '';
      return kbReports.filter(r => {
        if (kbSourceTypeFilter && r.sourceType !== kbSourceTypeFilter) return false;
        if (kbTopicFilter && !(r.topics || []).includes(kbTopicFilter)) return false;
        if (query) {
          const haystack = [r.title, r.description, r.author, r.publisher, ...(r.topics || [])].join(' ').toLowerCase();
          return haystack.includes(query);
        }
        return true;
      });
    }

    function renderKBCards() {
      const cardsContainer = document.getElementById('kbCards');
      if (!cardsContainer) return;
      const filtered = getFilteredKBReports();

      // Update stats
      const statsEl = cardsContainer.previousElementSibling;
      if (statsEl) {
        const filteredCount = filtered.length;
        statsEl.innerHTML = `共 <strong>${kbReports.length}</strong> 份报告${filteredCount !== kbReports.length ? ` · 当前显示 <strong>${filteredCount}</strong> 份` : ''}`;
      }

      if (filtered.length === 0) {
        cardsContainer.innerHTML = `<div class="kb-empty"><div class="kb-empty-icon">📚</div><h3>${kbReports.length === 0 ? '知识库为空' : '未找到匹配报告'}</h3><p>${kbReports.length === 0 ? '将报告文件发给 Javis，即可自动解析分类并纳入知识库。' : '试试调整搜索条件或筛选器'}</p></div>`;
        return;
      }

      let html = '<div class="kb-grid">';
      filtered.forEach(report => {
        const typeInfo = KB_SOURCE_TYPES[report.sourceType] || KB_SOURCE_TYPES.industry;
        const topicIcons = (report.topics || []).map(t => {
          const icon = KB_TOPIC_TAGS[t] || '📌';
          return `<span class="kb-card-tag">${icon} ${t}</span>`;
        }).join('');

        html += `<div class="kb-card">`;
        html += `<div class="kb-card-header">`;
        html += `<div class="kb-card-icon ${typeInfo.class}">${typeInfo.icon}</div>`;
        html += `<span class="kb-card-type ${typeInfo.class}">${typeInfo.label}</span>`;
        html += `</div>`;
        html += `<div class="kb-card-title">${esc(report.title)}</div>`;
        html += `<div class="kb-card-desc">${esc(report.description)}</div>`;
        html += `<div class="kb-card-meta">`;
        html += topicIcons;
        if (report.date) html += `<span class="kb-card-date">${esc(report.date)}</span>`;
        html += `</div>`;
        if (report.author) {
          html += `<div class="kb-card-file">✍️ ${esc(report.author)}${report.publisher ? ' · ' + esc(report.publisher) : ''}</div>`;
        }
        if (report.fileName) {
          html += `<div class="kb-card-file">📎 ${esc(report.fileName)}${report.fileSize ? ' (' + esc(report.fileSize) + ')' : ''}</div>`;
        }
        html += `</div>`;
      });
      html += '</div>';
      cardsContainer.innerHTML = html;
    }

    function setKBSourceFilter(type) {
      kbSourceTypeFilter = type;
      renderKBPage();
    }
    function setKBTopicFilter(topic) {
      kbTopicFilter = topic;
      renderKBPage();
    }

    // ============================================================
    // Init
    // ============================================================
    document.getElementById('searchBox').addEventListener('input', renderInfoList);
    loadData();
  </script>
</body>
</html>
